      if(!blade.pos) continue;
      const gx=blade.pos.x, gy=blade.pos.y;
      for(let i=0;i<4;i++) {
        const b=QBR[i];
        if(gx>=b.xl*GW && gx<=b.xr*GW && gy>=b.yt*GH && gy<=b.yb*GH) { newHover=i; break outer; }
      }
    }
    if(newHover === this._quizHoverBox && newHover >= 0) {
      this._quizHoverT += dtReal;
      if(this._quizHoverT >= HOVER_SELECT_T) this._answerQuiz(newHover);
    } else {
      this._quizHoverBox = newHover; this._quizHoverT = 0;
    }
  }

  // 불씨만 그리는 공용 헬퍼 (배경 그라디언트 없이)
  _drawEmbers(ctx, W, H) {
    const t = performance.now()/1000;
    for(let i=0;i<55;i++) {
      const life=((t*0.28+i*0.182)%1);
      const ex=((i*W*0.183+Math.sin(t*0.55+i*1.3)*W*0.07)%W+W)%W;
      const ey=H*(1-life*1.1)+Math.sin(t*1.1+i*0.9)*H*0.03;
      if(ey<-10) continue;
      const sz=0.8+(i%4)*0.5;
      const a=life<0.12?life/0.12:life>0.75?(1-life)/0.25:1;
      ctx.fillStyle=`rgba(255,${40+(i%5)*18},0,${a*0.65})`;
      ctx.beginPath(); ctx.arc(ex,ey,sz,0,TAU); ctx.fill();
    }
  }

  // ── 배경 (다크 판타지 분위기) ──
  _drawAnimBg(ctx, W, H) {
    const t = performance.now()/1000;
    // 기본 어두운 그라디언트
    const g = ctx.createRadialGradient(W*0.5, H*0.45, 0, W*0.5, H*0.5, Math.hypot(W,H)*0.6);
    g.addColorStop(0,'#180608');
    g.addColorStop(0.5,'#0d0204');
    g.addColorStop(1,'#050102');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    // 바닥 붉은 안개
    const fog = ctx.createLinearGradient(0, H*0.6, 0, H);
    fog.addColorStop(0,'rgba(100,5,0,0)');
    fog.addColorStop(1,'rgba(80,3,0,0.55)');
    ctx.fillStyle=fog; ctx.fillRect(0, H*0.6, W, H*0.4);

    // 날아오르는 불씨
    this._drawEmbers(ctx, W, H);

    // 하단 불꽃 잔영
    for(let i=0;i<8;i++) {
      const fx = W*(0.08+i*0.12) + Math.sin(t*1.2+i*1.8)*W*0.025;
      const fh = H*(0.04+0.035*Math.sin(t*2+i*0.9));
      ctx.save();
      ctx.globalAlpha = 0.18+0.08*Math.sin(t*2.5+i);
      const fg=ctx.createLinearGradient(0,H,0,H-fh);
      fg.addColorStop(0,`rgba(220,${20+i*8},0,1)`);
      fg.addColorStop(1,'rgba(255,80,0,0)');
      ctx.fillStyle=fg;
      ctx.fillRect(fx-14, H-fh, 28, fh);
      ctx.restore();
    }

    // 워터마크
    ctx.save(); ctx.globalAlpha=0.04;
    ctx.font=`bold ${Math.min(W,H)*0.09}px 'Hahmlet',sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#cc2200';
    ctx.fillText('대전대신고등학교', W/2, H*0.5);
    ctx.restore();
  }

  // ── 만화 속도선 ──
  _drawSpeedLines(ctx, W, H, t, alpha=1) {
    const cx=W/2, cy=H/2;
    const maxR=Math.hypot(cx,cy)*1.3;
    const N=90;
    ctx.save(); ctx.globalAlpha=alpha;
    for(let i=0;i<N;i++) {
      const ang=(i/N)*TAU + t*0.15;
      const w0=0.008, w1=0.022;
      ctx.beginPath();
      ctx.moveTo(cx+Math.cos(ang-w0)*maxR*0.04, cy+Math.sin(ang-w0)*maxR*0.04);
      ctx.lineTo(cx+Math.cos(ang-w1)*maxR,      cy+Math.sin(ang-w1)*maxR);
      ctx.lineTo(cx+Math.cos(ang+w1)*maxR,      cy+Math.sin(ang+w1)*maxR);
      ctx.lineTo(cx+Math.cos(ang+w0)*maxR*0.04, cy+Math.sin(ang+w0)*maxR*0.04);
      ctx.closePath();
      ctx.fillStyle = i%2===0 ? 'rgba(0,0,0,0.65)' : 'rgba(255,255,255,0.85)';
      ctx.fill();
    }
    ctx.restore();
  }

  // ── 전신 불꽃 효과 ──
  _drawFireEffect(ctx, W, H, t) {
    const inten = Math.min(t*1.8, 1);
    const pulse = 0.7 + Math.sin(t*14)*0.3;

    // 전체 붉은 오버레이
    ctx.fillStyle=`rgba(200,30,0,${0.38*inten*pulse})`;
    ctx.fillRect(0,0,W,H);

    // 아래→위 불꽃 기둥 12개
    for(let i=0;i<12;i++) {
      const fx = W*(i/12+0.04) + Math.sin(t*2.8+i*1.7)*W*0.03;
      const fh = H*(0.5+0.35*Math.sin(t*2.1+i*0.85))*inten;
      const fw = W*0.058;
      ctx.save();
      ctx.globalAlpha=(0.55+0.4*Math.sin(t*3.5+i))*inten;
      ctx.beginPath();
      ctx.moveTo(fx-fw*0.5, H);
      ctx.bezierCurveTo(fx-fw,H-fh*0.35, fx-fw*0.3,H-fh*0.75, fx,H-fh);
      ctx.bezierCurveTo(fx+fw*0.3,H-fh*0.75, fx+fw,H-fh*0.35, fx+fw*0.5,H);
      ctx.closePath();
      const fg=ctx.createLinearGradient(0,H,0,H-fh);
      fg.addColorStop(0,`rgba(255,${60+i*8},0,1)`);
      fg.addColorStop(0.55,`rgba(255,30,0,0.75)`);
      fg.addColorStop(1,'rgba(255,160,0,0)');
      ctx.fillStyle=fg; ctx.fill();
      ctx.restore();
    }

    // 위쪽에서도 짧은 불꽃
    for(let i=0;i<8;i++) {
      const fx = W*(i/8+0.06) + Math.sin(t*2.2+i*2.1)*W*0.04;
      const fh = H*(0.2+0.18*Math.sin(t*2.4+i))*inten;
      const fw = W*0.045;
      ctx.save();
      ctx.globalAlpha=(0.4+0.3*Math.sin(t*4+i))*inten;
      ctx.beginPath();
      ctx.moveTo(fx-fw*0.5,0);
      ctx.bezierCurveTo(fx-fw,fh*0.35, fx-fw*0.3,fh*0.75, fx,fh);
      ctx.bezierCurveTo(fx+fw*0.3,fh*0.75, fx+fw,fh*0.35, fx+fw*0.5,0);
      ctx.closePath();
      const fg=ctx.createLinearGradient(0,0,0,fh);
      fg.addColorStop(0,`rgba(255,${50+i*9},0,0.9)`);
      fg.addColorStop(1,'rgba(255,120,0,0)');
      ctx.fillStyle=fg; ctx.fill();
      ctx.restore();
    }

    // 불꽃 파편(ember) — 결정론적 위치
    for(let i=0;i<30;i++) {
      const ex=((i*W*0.11+Math.sin(t*1.3+i*0.9)*W*0.06)+W)%W;
      const ey=(H-(((t*180*(0.4+i*0.05))%H)+H))%H;
      if(ey<0||ey>H) continue;
      ctx.fillStyle=`rgba(255,${130+(i%5)*20},0,${0.75*inten})`;
      ctx.beginPath(); ctx.arc(ex,ey,1.5+(i%4),0,TAU); ctx.fill();
    }

    // 상하 가장자리 글로우
    const tg=ctx.createLinearGradient(0,0,0,H*0.25);
    tg.addColorStop(0,`rgba(255,50,0,${0.55*inten})`);
    tg.addColorStop(1,'rgba(255,50,0,0)');
    ctx.fillStyle=tg; ctx.fillRect(0,0,W,H*0.25);
    const bg=ctx.createLinearGradient(0,H*0.75,0,H);
    bg.addColorStop(0,'rgba(255,80,0,0)');
    bg.addColorStop(1,`rgba(255,80,0,${0.7*inten})`);
    ctx.fillStyle=bg; ctx.fillRect(0,H*0.75,W,H*0.25);
  }

  // ── 눈빛 이펙트 ──
  _drawEyeGlow(ctx, W, H, t, time) {
    const eyes=[{x:W*0.43,y:H*0.33},{x:W*0.57,y:H*0.33}];
    for(const eye of eyes) {
      const numBeams=18;
      for(let i=0;i<numBeams;i++) {
        const ang=(i/numBeams)*TAU + time*1.8;
        const len=W*0.14*(0.5+0.5*Math.sin(time*4+i));
        ctx.save();
        ctx.globalAlpha=t*0.75;
        ctx.strokeStyle=`hsl(${45+i*8},100%,75%)`;
        ctx.lineWidth=2.5; ctx.lineCap='round';
        ctx.shadowBlur=18; ctx.shadowColor='#ffff88';
        ctx.beginPath(); ctx.moveTo(eye.x,eye.y);
        ctx.lineTo(eye.x+Math.cos(ang)*len, eye.y+Math.sin(ang)*len);
        ctx.stroke(); ctx.shadowBlur=0; ctx.restore();
      }
      // 코어 플레어
      ctx.save(); ctx.globalAlpha=t;
      ctx.shadowBlur=35; ctx.shadowColor='#ffffff';
      ctx.fillStyle='#ffffff';
      ctx.beginPath(); ctx.arc(eye.x,eye.y,10*t,0,TAU); ctx.fill();
      ctx.shadowBlur=0; ctx.restore();
    }
  }

  // ── 퀴즈 드로우 ──
  _drawQuizAnnounce(ctx,W,H,f) {
    const t = Math.min(this._quizAnnounceT/2.0, 1);
    ctx.fillStyle=`rgba(10,0,30,${0.78*Math.min(t*4,1)})`; ctx.fillRect(0,0,W,H);
    const sc = 0.3 + t*0.7 + Math.sin(t*Math.PI)*0.18;
    const al = Math.min(t*3,1) * (t>0.85 ? 1-(t-0.85)/0.15 : 1);
    ctx.save();
    ctx.globalAlpha=al; ctx.translate(W/2,H/2); ctx.scale(sc,sc);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`bold ${f(150)}px 'Hahmlet',sans-serif`;
    ctx.shadowBlur=80; ctx.shadowColor='#ff4400';
    ctx.fillStyle='#ffee00'; ctx.fillText('문제!',0,0);
    ctx.shadowBlur=0; ctx.restore();
  }

  _wrapText(ctx, text, maxWidth) {
    const lines=[]; let line='';
    for(const ch of text) {
      if(ctx.measureText(line+ch).width > maxWidth && line) { lines.push(line); line=ch; }
      else line+=ch;
    }
    if(line) lines.push(line);
    return lines;
  }

  _drawQuizQuestion(ctx,W,H,f) {
    ctx.fillStyle='rgba(0,0,20,0.78)'; ctx.fillRect(0,0,W,H);
    if(!this._currentQuiz) return;
    const q=this._currentQuiz;
    // 질문 텍스트 (자동 줄 바꿈)
    ctx.font=`bold ${f(42)}px 'Hahmlet',sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const lines=this._wrapText(ctx,q.q, W*0.88);
    const lineH=f(50);
    const totalH=lines.length*lineH;
    const startY=H*0.13 - totalH/2 + lineH/2;
    lines.forEach((ln,li)=>{
      ctx.fillStyle='#ffe040'; ctx.shadowBlur=14; ctx.shadowColor='#ff8800';
      ctx.fillText(ln, W/2, startY+li*lineH);
    });
    ctx.shadowBlur=0;
    // 4개 박스
    for(let i=0;i<4;i++) {
      const b=QBR[i];
      const bx=b.xl*W, by=b.yt*H, bw=(b.xr-b.xl)*W, bh=(b.yb-b.yt)*H;
      const isHov=this._quizHoverBox===i;
      const prog=isHov ? Math.min(this._quizHoverT/HOVER_SELECT_T,1) : 0;
      const r=Math.min(bw,bh)*0.1;
      ctx.save();
      ctx.shadowBlur=isHov?32:14; ctx.shadowColor=BOX_SHD[i];
      ctx.fillStyle=isHov?BOX_HOV[i]:BOX_FILL[i];
      ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,r); ctx.fill();
      // 테두리
      ctx.strokeStyle=BOX_SHD[i]; ctx.lineWidth=isHov?4:2;
      ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,r); ctx.stroke();
      ctx.shadowBlur=0;
      // 호버 진행 바
      if(prog>0) {
        ctx.fillStyle=`rgba(255,255,255,0.35)`;
        ctx.beginPath(); ctx.roundRect(bx,by+bh-bh*0.12,bw*prog,bh*0.12,r*0.5); ctx.fill();
      }
      // 번호
      ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.font=`bold ${f(52)}px 'Hahmlet',sans-serif`;
      ctx.fillStyle='#ffffff'; ctx.shadowBlur=8; ctx.shadowColor='rgba(0,0,0,0.8)';
      ctx.fillText(BOX_LABEL[i], bx+bw*0.05, by+bh*0.5);
      // 옵션 텍스트
      ctx.textAlign='center';
      ctx.font=`bold ${f(40)}px 'Hahmlet',sans-serif`;
      ctx.fillStyle='#ffffff';
      ctx.fillText(q.opts[i], bx+bw*0.58, by+bh*0.5);
      ctx.shadowBlur=0; ctx.restore();
    }
    // 남은 시간 바
    const remain=Math.max(0,1-this._quizQuestionT/20);
    ctx.fillStyle='rgba(255,255,255,0.12)';
    ctx.fillRect(0,H*0.97,W,H*0.03);
    ctx.fillStyle='#ffee44';
    ctx.fillRect(0,H*0.97,W*remain,H*0.03);
    // 안내
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`${f(22)}px 'Hahmlet',sans-serif`;
    ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.fillText('손을 박스 위에 올려 유지하면 선택!', W/2, H*0.93);
  }

  _drawQuizCorrect(ctx,W,H,f) {
    const t=Math.min(this._quizResultT/3.0,1);
    const zoomT=Math.min(this._quizResultT*0.8,1);
    // 속도선
    this._drawSpeedLines(ctx,W,H,this._quizResultT,Math.min(t*3,1));
    // 카메라 줌
    if(this.camFrame && this.camFrame.readyState>=2) {
      const zoom=1+zoomT*1.6;
      const fx=W/2, fy=H*0.3;
      ctx.save();
      ctx.translate(fx,fy); ctx.scale(zoom,zoom); ctx.translate(-fx,-fy);
      ctx.save(); ctx.translate(W,0); ctx.scale(-1,1);
      ctx.drawImage(this.camFrame,0,0,W,H);
      ctx.restore(); ctx.restore();
    }
    // 전신 불꽃
    this._drawFireEffect(ctx,W,H,this._quizResultT);
    // 텍스트
    const pulse=1+Math.sin(this._quizResultT*6)*0.08;
    ctx.save();
    ctx.globalAlpha=Math.min(t*4,1)*(t>0.88?1-(t-0.88)/0.12:1);
    ctx.translate(W/2,H*0.76); ctx.scale(pulse,pulse);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`bold ${f(96)}px 'Hahmlet',sans-serif`;
    ctx.fillStyle='#ffe040'; ctx.shadowBlur=60; ctx.shadowColor='#ff8800';
    ctx.fillText('보너스 타임!',0,0);
    ctx.shadowBlur=120; ctx.shadowColor='#ffff00'; ctx.globalAlpha*=0.35;
    ctx.fillText('보너스 타임!',0,0);
    ctx.shadowBlur=0; ctx.restore();
  }

  _drawQuizWrong(ctx,W,H,f) {
    const t=Math.min(this._quizResultT/2.0,1);
    const flash=Math.sin(t*Math.PI);
    ctx.fillStyle=`rgba(200,0,0,${flash*0.72})`; ctx.fillRect(0,0,W,H);
    ctx.save();
    ctx.globalAlpha=flash;
    ctx.translate(W/2,H*0.42);
    const sc=0.6+t*0.4+Math.sin(t*Math.PI)*0.12; ctx.scale(sc,sc);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`bold ${f(110)}px 'Hahmlet',sans-serif`;
    ctx.fillStyle='#ffffff'; ctx.shadowBlur=50; ctx.shadowColor='#ff0000';
    ctx.fillText('틀렸어요!',0,0); ctx.shadowBlur=0; ctx.restore();
    ctx.save();
    ctx.globalAlpha=flash*0.9;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`bold ${f(72)}px 'Hahmlet',sans-serif`;
    ctx.fillStyle='#ff8888'; ctx.shadowBlur=24; ctx.shadowColor='#ff0000';
    ctx.fillText('점수 -1000점!',W/2,H*0.62);
    // 정답 표시
    if(this._currentQuiz) {
      ctx.font=`bold ${f(38)}px 'Hahmlet',sans-serif`;
      ctx.fillStyle='#ffeeee'; ctx.shadowBlur=10; ctx.shadowColor='#ff0000';
      ctx.fillText(`정답: ${BOX_LABEL[this._currentQuiz.ans]} ${this._currentQuiz.opts[this._currentQuiz.ans]}`, W/2, H*0.75);
    }
    ctx.shadowBlur=0; ctx.restore();
  }

  _drawGameOver(ctx,W,H,f) {
    const lt = this._gameOverLockT; // 게임오버 후 경과 시간
    const t  = performance.now()/1000;
    ctx.textAlign='center'; ctx.textBaseline='middle';

    // ── 1. 배경: 짙은 암흑 + 붉은 안개 ──
    const bgPulse = 0.62 + Math.sin(t*1.1)*0.06;
    ctx.fillStyle=`rgba(3,0,1,${bgPulse})`; ctx.fillRect(0,0,W,H);

    // 바닥 붉은 안개
    const fog = ctx.createLinearGradient(0,H*0.5,0,H);
    fog.addColorStop(0,'rgba(0,0,0,0)');
    fog.addColorStop(1,`rgba(90,4,0,${0.5+Math.sin(t*0.7)*0.1})`);
    ctx.fillStyle=fog; ctx.fillRect(0,H*0.5,W,H*0.5);

    // 상단 검은 안개
    const topFog = ctx.createLinearGradient(0,0,0,H*0.35);
    topFog.addColorStop(0,'rgba(0,0,0,0.82)');
    topFog.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=topFog; ctx.fillRect(0,0,W,H*0.35);

    // ── 2. 화면 균열 ──
    this._drawCracks(ctx,W,H,clamp(lt/0.4,0,1));

    // ── 3. 핏방울 (상단에서 흘러내림) ──
    this._drawBloodDrips(ctx,W,H,lt);

    // ── 4. 불씨 ──
    this._drawEmbers(ctx,W,H);

    // ── 5. 가장자리 붉은 비네트 (심장박동처럼 맥박) ──
    const vPulse = 0.45 + Math.sin(t*2.2)*0.15;
    const vg = ctx.createRadialGradient(W/2,H/2,H*0.18,W/2,H/2,H*0.82);
    vg.addColorStop(0,'rgba(0,0,0,0)');
    vg.addColorStop(0.6,'rgba(60,0,0,0.22)');
    vg.addColorStop(1,`rgba(180,0,0,${vPulse})`);
    ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

    // ── 6. GAME OVER 텍스트 (위에서 내려치는 애니메이션) ──
    const goProgress = clamp(lt/0.55,0,1);
    const goEase = goProgress < 0.7
      ? goProgress/0.7
      : 1 + Math.sin((goProgress-0.7)/0.3*Math.PI)*0.08; // 마지막 튕김
    const goY = lerp(-H*0.2, H*0.26, goEase);

    ctx.save();
    ctx.translate(W/2, goY);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    // 외곽 짙은 그림자
    ctx.font=`bold ${f(102)}px 'Hahmlet',sans-serif`;
    // 외곽선으로 글로우 대체
    ctx.strokeStyle='rgba(40,0,0,0.95)'; ctx.lineWidth=f(18); ctx.lineJoin='round';
    ctx.strokeText('GAME OVER', 0, 0);
    ctx.strokeStyle='rgba(180,0,0,0.6)'; ctx.lineWidth=f(10);
    ctx.strokeText('GAME OVER', 0, 0);
    ctx.fillStyle='#aa0000'; ctx.fillText('GAME OVER', 0, 0);
    // 메인 그라디언트
    const goG = ctx.createLinearGradient(0,-f(55),0,f(55));
    goG.addColorStop(0,'#ff6655');
    goG.addColorStop(0.35,'#dd1100');
    goG.addColorStop(0.7,'#880000');
    goG.addColorStop(1,'#440000');
    ctx.fillStyle=goG; ctx.fillText('GAME OVER', 0, 0);
    // 상단 하이라이트
    ctx.fillStyle='rgba(255,160,140,0.14)'; ctx.fillText('GAME OVER', 0, 0);
    ctx.restore();

    // ── 7. 구분선 ──
    if(lt > 0.5) {
      const lineA = clamp((lt-0.5)/0.3,0,1);
      ctx.save(); ctx.globalAlpha=lineA*0.6;
      const lg = ctx.createLinearGradient(W*0.1,0,W*0.9,0);
      lg.addColorStop(0,'rgba(180,20,0,0)');
      lg.addColorStop(0.5,'rgba(255,40,0,0.9)');
      lg.addColorStop(1,'rgba(180,20,0,0)');
      ctx.strokeStyle=lg; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(W*0.1,H*0.385); ctx.lineTo(W*0.9,H*0.385); ctx.stroke();
      ctx.restore();
    }

    // ── 8. 점수 패널 (lt>0.6 이후 등장) ──
    if(lt > 0.6) {
      const scoreA = clamp((lt-0.6)/0.4,0,1);
      const easeScore = 1 - Math.pow(1-scoreA,3);
      const scoreY = lerp(H*0.65, H*0.46, easeScore);

      ctx.save(); ctx.globalAlpha=clamp(scoreA*2,0,1);
      ctx.translate(W/2, scoreY);
      ctx.textAlign='center'; ctx.textBaseline='middle';

      // 점수 라벨
      ctx.font=`${f(18)}px 'Hahmlet',sans-serif`;
      ctx.fillStyle='rgba(200,80,0,0.8)';
      ctx.fillText('S C O R E', 0, -f(28));

      // 점수 숫자
      const finalScore = this.scoring.score;
      const displayScore = Math.round(finalScore * clamp((lt-0.6)/0.6,0,1));
      const scoreStr = displayScore.toLocaleString() + '점';
      ctx.font=`bold ${f(66)}px 'Hahmlet',sans-serif`;
      ctx.shadowBlur=40; ctx.shadowColor='rgba(255,150,0,0.5)';
      const scG = ctx.createLinearGradient(0,-f(36),0,f(36));
      scG.addColorStop(0,'#ffffff');
      scG.addColorStop(0.5,'#ffe8aa');
      scG.addColorStop(1,'#cc9933');
      ctx.fillStyle=scG;
      ctx.fillText(scoreStr, 0, 0);
      ctx.shadowBlur=0;
      ctx.restore();
    }

    // ── 9. 최고기록 배지 (lt>1.1) ──
    if(lt > 1.1 && this.bestRecord.score > 0) {
      const recA = clamp((lt-1.1)/0.4,0,1);
      const easeRec = 1-Math.pow(1-recA,3);
      ctx.save(); ctx.globalAlpha=easeRec;
      ctx.translate(W/2, H*0.575);
      ctx.textAlign='center'; ctx.textBaseline='middle';

      if(this._newRecord) {
        // 신기록: 금색 배지 + 펄스
        const pulse = 1+Math.sin(t*3.5)*0.06;
        ctx.scale(pulse,pulse);
        ctx.font=`bold ${f(34)}px 'Hahmlet',sans-serif`;
        ctx.shadowBlur=35; ctx.shadowColor='#ffaa00';
        const ng = ctx.createLinearGradient(-f(120),0,f(120),0);
        ng.addColorStop(0,'#ffaa00'); ng.addColorStop(0.5,'#ffee44'); ng.addColorStop(1,'#ffaa00');
        ctx.fillStyle=ng;
        ctx.fillText('🏆 신기록 갱신!', 0, 0);
      } else {
        const recStr=`🏆  ${this.bestRecord.name}  ${this.bestRecord.score.toLocaleString()}점`;
        ctx.font=`bold ${f(26)}px 'Hahmlet',sans-serif`;
        ctx.shadowBlur=14; ctx.shadowColor='rgba(255,180,0,0.5)';
        ctx.fillStyle='#ffdd55';
        ctx.fillText(recStr, 0, 0);
      }
      ctx.shadowBlur=0; ctx.restore();
    }

    // ── 10. 베스트 콤보 (lt>1.4) ──
    if(lt > 1.4 && this.scoring.bestCombo > 1) {
      const comA = clamp((lt-1.4)/0.35,0,1);
      ctx.save(); ctx.globalAlpha=comA;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.font=`${f(21)}px 'Hahmlet',sans-serif`;
      ctx.fillStyle='rgba(150,200,255,0.8)';
      ctx.fillText(`최고 콤보  ×${this.scoring.bestCombo}`, W/2, H*0.645);
      ctx.restore();
    }

    // ── 11. 재시작 안내 (lt>=2.0) ──
    if(lt >= 2.0) {
      const restartA = clamp((lt-2.0)/0.4,0,1);
      const pulse2 = 0.78+Math.sin(t*2.2)*0.22;
      ctx.save(); ctx.globalAlpha=restartA*pulse2;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.font=`bold ${f(26)}px 'Hahmlet',sans-serif`;
      ctx.fillStyle='rgba(220,200,180,0.92)';
      ctx.shadowBlur=10; ctx.shadowColor='rgba(0,0,0,0.8)';
      ctx.fillText('🙌 양손을 들어 재시작  /  R · SPACE', W/2, H*0.74);
      ctx.shadowBlur=0; ctx.restore();
    }

    // ── 12. 하단 타이머 바 (lt>=3.5) ──
    if(lt >= 3.5) {
      const prog = clamp((lt-3.5)/1.0,0,1);
      ctx.fillStyle='rgba(255,255,255,0.07)';
      ctx.fillRect(0,H-f(5),W,f(5));
      const barG = ctx.createLinearGradient(0,0,W*(1-prog),0);
      barG.addColorStop(0,'#ff4400');
      barG.addColorStop(1,'#ff8800');
      ctx.fillStyle=barG;
      ctx.fillRect(0,H-f(5),W*(1-prog),f(5));
    }

    this._drawBothHandsBar(ctx,W,H,f);
  }

  // ═══════════════ SKILL SYSTEM ═══════════════
  _updateSkills(dt, dtReal) {
    const sk = this._skills;
    const now = performance.now()/1000;

    // 쿨타임/액티브 감소
    for(const s of Object.values(sk)) {
      if(s.cd    > 0) s.cd    = Math.max(0, s.cd    - dtReal);
      if(s.active> 0) s.active = Math.max(0, s.active - dtReal);
    }

    // 뇌격 활성 중 지속 번개 스폰
    if(sk.thunder.active > 0 && Math.random() < dtReal * 10) {
      const x0 = rnd(GW*0.05, GW*0.95);
      this.effects._lightnings.push(
        new Lightning(x0, 0, x0+rnd(-140,140), rnd(GH*0.3,GH), '#ff5500')
      );
    }

    // 활성 스킬이 있으면 새 발동 불가
    const anyActive = Object.values(sk).some(s => s.active > 0);
    if(anyActive) return;

    // ── ⚡ 뇌격: 양손 화면 상단에 들어올리기 ──
    if(sk.thunder.cd <= 0) {
      const w0 = this.blades[0].wrist, w1 = this.blades[1].wrist;
      const bothRaised = w0 && w1 &&
                         w0.y < GH * THUNDER_HEIGHT &&
                         w1.y < GH * THUNDER_HEIGHT;
      if(bothRaised) {
        sk.thunder.holdT += dtReal;
        if(sk.thunder.holdT >= THUNDER_HOLD) this._triggerThunder();
      } else {
        sk.thunder.holdT = 0;
      }
    }

    // ── ❄ 시간 동결: 양손 주먹 ──
    if(sk.freeze.cd <= 0) {
      const lm0 = this._rawLm[0], lm1 = this._rawLm[1];
      const bothFist = lm0 && lm1 && isFist(lm0) && isFist(lm1);
      if(bothFist) {
        sk.freeze.holdT += dtReal;
        if(sk.freeze.holdT >= FREEZE_HOLD) this._triggerFreeze();
      } else {
        sk.freeze.holdT = 0;
      }
    }

    // ── 💥 빅뱅: 두 손 수렴 → 빠르게 발산 ──
    if(sk.bigbang.cd <= 0) {
      const p0 = this.blades[0].pos, p1 = this.blades[1].pos;
      if(p0 && p1) {
        const dist = Math.hypot(p0.x - p1.x, p0.y - p1.y);
        // 수렴 감지
        if(dist < BIGBANG_NEAR) {
          if(!sk.bigbang.wasNear) {
            sk.bigbang.wasNear = true;
            sk.bigbang.nearTime = now;
          }
        }
        // 수렴 상태 유지 중: 발산 or 타임아웃 체크
        if(sk.bigbang.wasNear) {
          const elapsed = now - sk.bigbang.nearTime;
          if(dist > BIGBANG_FAR_DELTA && elapsed < BIGBANG_EXPAND_T) {
            this._triggerBigBang();               // 발동!
          } else if(elapsed >= BIGBANG_EXPAND_T) {
            sk.bigbang.wasNear = false;            // 타임아웃 리셋
          }
        }
      } else {
        // 한 손이 화면 밖으로 나가도 wasNear 유지 (0.3초 유예)
        if(sk.bigbang.wasNear && (now - sk.bigbang.nearTime) >= BIGBANG_EXPAND_T)
          sk.bigbang.wasNear = false;
      }
    }
  }

  _triggerThunder() {
    if(Object.values(this._skills).some(s=>s.active>0)) return;
    const sk = this._skills.thunder;
    sk.cd = THUNDER_CD; sk.active = THUNDER_DUR; sk.holdT = 0;

    // 보스전 중: 보스에 10 데미지
    if(this._boss) {
      for(let i=0;i<10;i++) { if(this._boss.hit()) { this._triggerBossDead(); return; } }
      this._boss.hitFlash=1;
      this.effects.addShake(14); this.effects.addFlash(0.35);
      this.scoring.popups.push(new Popup(GW/2,GH*0.35,'⚡ 뇌격 -10!','#ff8800',2.8));
      return;
    }

    // 화면 모든 일반 오브젝트 슬라이스
    const targets = this.entities.filter(e=>e.kind!=='bomb'&&!e.sliced&&e.alive);
    targets.forEach(e=>{
      e.sliced=e.alive=false;
      this.halves.push(new Half(e.x,e.y,e.vx-200,e.vy-100,e.type,-1));
      this.halves.push(new Half(e.x,e.y,e.vx+200,e.vy-100,e.type,+1));
      this.effects.juiceBurst(e.x,e.y,e.type.col,0.9,0,0,false);
    });
    if(targets.length>=2) this.scoring.registerCut(targets);

    // 번개 폭발 스폰
    for(let i=0;i<10;i++) {
      const x0=rnd(GW*0.05,GW*0.95);
      this.effects._lightnings.push(new Lightning(x0,-20, x0+rnd(-160,160), rnd(GH*0.35,GH*0.95),'#ff5500'));
    }
    this.effects.addFlash(0.5); this.effects.addShake(22);
    // 쇳소리 + 번개음
    this.audio._unlock();
    this.audio._tone(110,0.5,'sawtooth',0.55,35);
    this.audio._noise(0.25,3500,0.6,0.38);
    this.scoring.popups.push(new Popup(GW/2,GH*0.28,'⚡ 뇌격!','#ff8800',3.8));
  }

  _triggerFreeze() {
    if(Object.values(this._skills).some(s=>s.active>0)) return;
    const sk = this._skills.freeze;
    sk.cd = FREEZE_CD; sk.active = FREEZE_DUR; sk.holdT = 0;
    this.effects.addFlash(0.32);
    this.audio._unlock();
    this.audio._tone(520,0.35,'sine',0.38);
    this.audio._tone(260,0.55,'sine',0.22);
    this.scoring.popups.push(new Popup(GW/2,GH*0.28,'❄ 시간 동결!','#5599ff',3.5));
  }

  _triggerBigBang() {
    if(Object.values(this._skills).some(s=>s.active>0)) return;
    const sk = this._skills.bigbang;
    sk.cd = BIGBANG_CD; sk.active = 1.6; sk.wasNear = false;

    // 보스전 중: 보스에 20 데미지
    if(this._boss) {
      for(let i=0;i<20;i++) { if(this._boss.hit()) { this._triggerBossDead(); return; } }
      this._boss.hitFlash=1;
      this.effects._shockwaves.push({x:this._boss.x,y:this._boss.y,r:20,maxR:300,life:1.0});
      this.effects.addShake(SHAKE_MAX); this.effects.addFlash(0.6);
      this.scoring.popups.push(new Popup(GW/2,GH*0.35,'💥 빅뱅 -20!','#ff4400',3.2));
      return;
    }

    // 모든 오브젝트 슬라이스 (폭탄 포함 — 폭발 없이 사라짐)
    const all = this.entities.filter(e=>!e.sliced&&e.alive);
    all.forEach(e=>{
      e.sliced=e.alive=false;
      if(e.kind!=='bomb') {
        this.halves.push(new Half(e.x,e.y,e.vx-220,e.vy-110,e.type,-1));
        this.halves.push(new Half(e.x,e.y,e.vx+220,e.vy-110,e.type,+1));
        this.effects.juiceBurst(e.x,e.y,e.type.col,1.0);
      }
    });
    const fruits = all.filter(e=>e.kind!=='bomb');
    if(fruits.length>=2) this.scoring.registerCut(fruits);

    // 충격파 링
    this.effects._shockwaves.push({x:GW/2,y:GH/2,r:30,maxR:Math.hypot(GW,GH)*0.75,life:1.0});
    this.effects._shockwaves.push({x:GW/2,y:GH/2,r:10,maxR:Math.hypot(GW,GH)*0.5, life:0.8});

    this.effects.addFlash(0.88); this.effects.addShake(SHAKE_MAX);
    this.audio.playBomb();
    this.audio._tone(55,0.8,'sawtooth',0.65,18);
    this.scoring.popups.push(new Popup(GW/2,GH*0.28,'💥 빅뱅!','#ff4400',4.2));
  }

  // ── 스킬 HUD ──
  _drawSkillHUD(ctx,W,H,f,sx) {
    if(this.state!==PLAY && this.state!==STARTING && this.state!==BOSS_FIGHT && !(this.state===TUTORIAL && this._tutStep===5)) return;
    const sk = this._skills;
    const defs=[
      {key:'thunder',icon:'⚡',cd:THUNDER_CD,col:'#ff8800',hint:'양손 위로'},
      {key:'freeze', icon:'❄', cd:FREEZE_CD, col:'#4488ff',hint:'양손 주먹'},
      {key:'bigbang',icon:'💥',cd:BIGBANG_CD,col:'#ff3300',hint:'모아서 펼쳐'},
    ];
    const R=f(28), gap=f(18);
    const totalW=defs.length*(R*2+gap)-gap;
    const startX=W/2-totalW/2+R;
    const baseY=H-f(52);
    const anyActive=Object.values(sk).some(s=>s.active>0);

    defs.forEach((def,i)=>{
      const s=sk[def.key];
      const x=startX+i*(R*2+gap);
      const cdProg  = s.cd>0 ? s.cd/def.cd : 0;
      const isActive= s.active>0;
      const isReady = s.cd<=0 && s.active<=0;
      // 다른 스킬 활성 중이면 이 스킬 희미하게
      const blocked = anyActive && !isActive;
      ctx.save();
      if(blocked) ctx.globalAlpha=0.35;

      // 배경 원
      ctx.beginPath(); ctx.arc(x,baseY,R,0,TAU);
      ctx.fillStyle=isActive?'rgba(255,120,0,0.22)':'rgba(4,1,1,0.82)';
      ctx.fill();

      // 테두리 / 쿨타임 호
      if(isActive) {
        const pulse=0.65+Math.sin(performance.now()/115)*0.35;
        ctx.globalAlpha=(blocked?0.35:1)*pulse*0.3; ctx.fillStyle=def.col;
        ctx.beginPath(); ctx.arc(x,baseY,R*1.55,0,TAU); ctx.fill();
        ctx.globalAlpha=(blocked?0.35:1)*pulse;
        ctx.strokeStyle=def.col; ctx.lineWidth=3.5;
        ctx.beginPath(); ctx.arc(x,baseY,R,0,TAU); ctx.stroke();
        ctx.globalAlpha=blocked?0.35:1;
      } else if(isReady) {
        ctx.strokeStyle=def.col; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(x,baseY,R,0,TAU); ctx.stroke();
      } else {
        ctx.strokeStyle='rgba(255,255,255,0.10)'; ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.arc(x,baseY,R,0,TAU); ctx.stroke();
        const filled=TAU*(1-cdProg);
        ctx.strokeStyle=def.col; ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.arc(x,baseY,R,-Math.PI/2,-Math.PI/2+filled); ctx.stroke();
      }

      // 충전 게이지 (holdT 있는 스킬: 뇌격·동결)
      const holdProg = def.key==='thunder' ? Math.min((s.holdT||0)/THUNDER_HOLD,1)
                     : def.key==='freeze'  ? Math.min((s.holdT||0)/FREEZE_HOLD, 1)
                     : 0;
      if(holdProg>0 && isReady) {
        ctx.fillStyle=`rgba(${def.key==='freeze'?'68,136,255':'255,136,0'},0.42)`;
        ctx.beginPath(); ctx.moveTo(x,baseY);
        ctx.arc(x,baseY,R,-Math.PI/2,-Math.PI/2+TAU*holdProg);
        ctx.closePath(); ctx.fill();
      }

      // 빅뱅 수렴 링 표시
      if(def.key==='bigbang' && s.wasNear && isReady) {
        const pulse=0.45+Math.sin(performance.now()/75)*0.55;
        ctx.strokeStyle=`rgba(255,80,0,${pulse})`; ctx.lineWidth=2.5;
        ctx.globalAlpha=pulse*0.35; ctx.fillStyle='#ff4400';
        ctx.beginPath(); ctx.arc(x,baseY,R+f(8),0,TAU); ctx.fill();
        ctx.globalAlpha=1;
        ctx.beginPath(); ctx.arc(x,baseY,R+f(5),0,TAU); ctx.stroke();
      }

      // 아이콘
      ctx.font=`${f(22)}px serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.globalAlpha=(blocked?0.35:1)*(isReady||isActive?1.0:0.38);
      ctx.fillText(def.icon,x,baseY);
      ctx.globalAlpha=blocked?0.35:1;

      // 쿨타임 숫자
      if(s.cd>0.5) {
        ctx.font=`bold ${f(13)}px 'Hahmlet',sans-serif`;
        ctx.textAlign='center'; ctx.textBaseline='top';
        ctx.fillStyle='rgba(255,255,255,0.55)';
        ctx.fillText(Math.ceil(s.cd)+'s',x,baseY+R+f(3));
      }

      // 제스처 힌트 (쿨타임 없을 때만)
      if(s.cd<=0 && !isActive) {
        ctx.font=`${f(11)}px 'Hahmlet',sans-serif`;
        ctx.textAlign='center'; ctx.textBaseline='top';
        ctx.fillStyle='rgba(255,255,255,0.42)';
        ctx.fillText(def.hint, x, baseY+R+f(3));
      }

      ctx.restore();
    });
  }

  // ── 번개 드로우 ──
  _drawLightnings(ctx, gs) {
    for(const lg of this.effects._lightnings) {
      const drawPath=(pts,lw,glow)=>{
        ctx.beginPath();
        pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
        ctx.lineWidth=lw; ctx.stroke();
      };
      ctx.save(); ctx.lineCap='round'; ctx.lineJoin='round';
      // 넓은 글로우 (두꺼운 반투명 선으로 대체)
      ctx.strokeStyle=lg.col; ctx.lineWidth=18*gs; ctx.globalAlpha=lg.alpha*0.18; drawPath(lg.pts);
      ctx.lineWidth=10*gs; ctx.globalAlpha=lg.alpha*0.28; drawPath(lg.pts);
      // 중간
      ctx.lineWidth=5*gs; ctx.globalAlpha=lg.alpha*0.55; drawPath(lg.pts);
      // 코어 흰 선
      ctx.strokeStyle='#ffffff'; ctx.lineWidth=1.8*gs; ctx.globalAlpha=lg.alpha; drawPath(lg.pts);
      // 가지
      for(const br of lg.branches) {
        ctx.strokeStyle=lg.col; ctx.lineWidth=2*gs; ctx.globalAlpha=lg.alpha*0.55; drawPath(br);
      }
      ctx.restore();
    }
  }

  // ── 충격파 드로우 ──
  _drawShockwaves(ctx, gs) {
    for(const sw of this.effects._shockwaves) {
      ctx.save();
      // outer glow ring
      ctx.globalAlpha=sw.life*0.25; ctx.strokeStyle='#ff5500';
      ctx.lineWidth=18*sw.life*gs;
      ctx.beginPath(); ctx.arc(sw.x,sw.y,sw.r,0,TAU); ctx.stroke();
      ctx.globalAlpha=sw.life*0.7;
      ctx.strokeStyle=`rgba(255,120,30,${sw.life})`;
      ctx.lineWidth=6*sw.life;
      ctx.beginPath(); ctx.arc(sw.x,sw.y,sw.r,0,TAU); ctx.stroke();
      if(sw.r>80) {
        ctx.globalAlpha=sw.life*0.35;
        ctx.strokeStyle=`rgba(255,220,80,${sw.life})`;
        ctx.lineWidth=2.5*sw.life;
        ctx.beginPath(); ctx.arc(sw.x,sw.y,sw.r*0.55,0,TAU); ctx.stroke();
      }
      ctx.restore();
    }
  }

  // ── 동결 오버레이 ──
  _drawFreezeOverlay(ctx,W,H) {
    const t=this._skills.freeze.active/FREEZE_DUR;
    const fade=Math.min(t*3,1);
    const now=performance.now()/1000;

    // 어두운 파란 틴트
    ctx.fillStyle=`rgba(5,15,50,${fade*0.50})`; ctx.fillRect(0,0,W,H);

    // 가장자리 서리 글로우
    const eg=ctx.createRadialGradient(W/2,H/2,H*0.22,W/2,H/2,H*0.88);
    eg.addColorStop(0,'rgba(0,0,0,0)');
    eg.addColorStop(0.55,`rgba(10,40,120,${fade*0.3})`);
    eg.addColorStop(1,`rgba(30,80,220,${fade*0.65})`);
    ctx.fillStyle=eg; ctx.fillRect(0,0,W,H);

    // 가장자리 서리 결정
    ctx.save(); ctx.globalAlpha=fade*0.75;
    for(let i=0;i<24;i++) {
      const ang=(i/24)*TAU;
      const ex=W/2+Math.cos(ang)*W*0.49;
      const ey=H/2+Math.sin(ang)*H*0.49;
      const len=W*0.045*(0.75+0.25*Math.sin(now*2.5+i*1.3));
      ctx.strokeStyle=`rgba(100,170,255,0.85)`;
      ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(ex,ey); ctx.lineTo(ex+Math.cos(ang)*len,ey+Math.sin(ang)*len);
      ctx.moveTo(ex,ey); ctx.lineTo(ex+Math.cos(ang+0.55)*len*0.55,ey+Math.sin(ang+0.55)*len*0.55);
      ctx.moveTo(ex,ey); ctx.lineTo(ex+Math.cos(ang-0.55)*len*0.55,ey+Math.sin(ang-0.55)*len*0.55);
      ctx.stroke();
    }
    ctx.restore();

    // 중앙에 동결 시계 (남은 시간 링)
    const remain=this._skills.freeze.active/FREEZE_DUR;
    if(remain>0) {
      ctx.save();
      ctx.globalAlpha=fade*0.45;
      ctx.strokeStyle='rgba(80,150,255,0.7)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(W/2,H/2,H*0.38,-Math.PI/2,-Math.PI/2+TAU*remain); ctx.stroke();
      ctx.restore();
    }
  }

  // ── 보스전 대기 효과 (경량화 버전) ──
  _drawBossAtmosphere(ctx,W,H,gs) {
    const t = performance.now()/1000;
    const boss = this._boss;
    const enraged = boss?.enraged ?? false;
    const pulse  = 0.5 + Math.sin(t * (enraged?8:3)) * 0.5;
    const pulse2 = 0.5 + Math.cos(t * (enraged?6:2.2) + 1.0) * 0.5;

    ctx.save();
    ctx.globalCompositeOperation='lighter';

    // 가장자리 4방향 그라디언트 (한 번에 처리)
    const bw = (enraged ? 55+pulse*35 : 30+pulse*18) * gs;
    const r0a = enraged ? 0.55+pulse*0.25 : 0.30+pulse*0.15;
    const r0b = enraged ? 0.50+pulse2*0.22 : 0.28+pulse2*0.12;
    const ec  = enraged ? 50 : 15;

    let g;
    g=ctx.createLinearGradient(0,0,0,bw); g.addColorStop(0,`rgba(255,${ec},0,${r0a})`); g.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=g; ctx.fillRect(0,0,W,bw);
    g=ctx.createLinearGradient(0,H,0,H-bw); g.addColorStop(0,`rgba(255,${ec},0,${r0b})`); g.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=g; ctx.fillRect(0,H-bw,W,bw);
    g=ctx.createLinearGradient(0,0,bw*0.65,0); g.addColorStop(0,`rgba(200,0,0,${r0a*0.85})`); g.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=g; ctx.fillRect(0,0,bw*0.65,H);
    g=ctx.createLinearGradient(W,0,W-bw*0.65,0); g.addColorStop(0,`rgba(200,0,0,${r0b*0.85})`); g.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=g; ctx.fillRect(W-bw*0.65,0,bw*0.65,H);

    ctx.restore();

    // 분노: 빨간 맥박 플래시 + 간단 번개
    if(enraged) {
      const rf = Math.max(0, Math.sin(t*16)) * 0.15;
      if(rf > 0.02) { ctx.fillStyle=`rgba(255,0,0,${rf})`; ctx.fillRect(0,0,W,H); }

      // 번개 (shadowBlur 없이 선만)
      ctx.save(); ctx.globalCompositeOperation='lighter';
      for(let i=0;i<2;i++) {
        const ba = Math.max(0, Math.sin(t*20+i*2.4)) * 0.5;
        if(ba < 0.05) continue;
        ctx.globalAlpha=ba;
        ctx.strokeStyle=`rgba(255,${80+i*40},0,1)`; ctx.lineWidth=gs*(1.5+i);
        const bx0=W*(0.15+i*0.5);
        ctx.beginPath(); ctx.moveTo(bx0,0); ctx.lineTo(bx0+(-40+i*50)*gs,H*0.45); ctx.lineTo(bx0+(20-i*30)*gs,H); ctx.stroke();
      }
      ctx.globalAlpha=1; ctx.restore();
    }

    // 보스 주변 파동 링 (shadowBlur 없이)
    if(boss && this.state!==BOSS_APPEAR) {
      const sx2=W/1280, sy2=H/720;
      const bx=boss.x*sx2, by2=boss.y*sy2, br=boss.r*Math.min(sx2,sy2);
      ctx.save(); ctx.globalCompositeOperation='lighter';
      for(let i=0;i<2;i++) {
        const ph=(t*(enraged?2.2:1.4)+i*Math.PI)%TAU;
        const ringR=br*(1.4+Math.sin(ph)*0.35);
        const ringA=Math.max(0,Math.sin(ph))*(enraged?0.5:0.28);
        if(ringA<0.04) continue;
        ctx.strokeStyle=enraged?`rgba(255,80,0,${ringA})`:`rgba(220,0,50,${ringA})`;
        ctx.lineWidth=gs*(enraged?4:2);
        ctx.beginPath(); ctx.arc(bx,by2,ringR,0,TAU); ctx.stroke();
      }
      // 보스 하단 지면 글로우 (단순 타원)
      ctx.globalAlpha=0.18+pulse*0.10;
      ctx.fillStyle=enraged?'rgba(255,60,0,1)':'rgba(200,0,40,1)';
      ctx.beginPath(); ctx.ellipse(bx,H*0.86,br*2,br*0.4,0,0,TAU); ctx.fill();
      ctx.globalAlpha=1; ctx.restore();

      // 보스 주변 불꽃 (6개만, shadowBlur 없음)
      ctx.save(); ctx.globalCompositeOperation='lighter';
      const fc = enraged ? 8 : 5;
      for(let i=0;i<fc;i++) {
        const ang=(i/fc)*TAU+t*(enraged?2.5:1.2);
        const dist=br*(1.15+Math.sin(t*2+i)*0.2);
        const px=bx+Math.cos(ang)*dist, py=by2+Math.sin(ang)*dist*0.5;
        const sz=gs*(enraged?4+Math.sin(t*7+i)*2:2.5+Math.sin(t*3+i)*1.2);
        ctx.globalAlpha=0.35+Math.sin(t*5+i*1.2)*0.25;
        ctx.fillStyle=enraged?'rgba(255,100,0,1)':'rgba(220,30,0,1)';
        ctx.beginPath(); ctx.arc(px,py,sz,0,TAU); ctx.fill();
      }
      ctx.globalAlpha=1; ctx.restore();
    }
  }

  // ── 보스 등장 오버레이 ──
  _drawBossAppear(ctx,W,H,f) {
    const t = this._bossAppearT;
    const fade = Math.min(t/0.3, 1);

    // 배경: 진한 빨간 단색 (사용자 요청 "불투명한 빨간색 단색화면")
    ctx.fillStyle=`rgba(140,0,0,${fade*0.95})`; ctx.fillRect(0,0,W,H);

    // 속도선
    if(t>0.2) this._drawSpeedLines(ctx,W,H,t, Math.min((t-0.2)/0.4,1)*0.7);

    // 상하 불꽃
    ctx.save(); ctx.globalCompositeOperation='lighter';
    for(let i=0;i<10;i++) {
      const fx=W*(i/10+0.05)+Math.sin(t*3+i)*W*0.03;
      const fh=H*(0.18+0.12*Math.sin(t*4+i))*fade;
      const fg=ctx.createLinearGradient(0,0,0,fh);
      fg.addColorStop(0,`rgba(255,${60+i*15},0,0.9)`); fg.addColorStop(1,'rgba(255,80,0,0)');
      ctx.fillStyle=fg; ctx.fillRect(fx-W*0.04,0,W*0.08,fh);
      const fb=ctx.createLinearGradient(0,H,0,H-fh);
      fb.addColorStop(0,`rgba(255,${40+i*12},0,0.85)`); fb.addColorStop(1,'rgba(255,60,0,0)');
      ctx.fillStyle=fb; ctx.fillRect(fx-W*0.04,H-fh,W*0.08,fh);
    }
    ctx.restore();

    // 중앙 텍스트
    const sc = 0.3 + Math.min(t/0.45,1)*0.7 + Math.sin(Math.min(t/0.45,1)*Math.PI)*0.22;
    const al = Math.min(t/0.25,1) * (t>2.1 ? Math.max(0,1-(t-2.1)/0.7) : 1);
    ctx.save();
    ctx.globalAlpha=al; ctx.translate(W/2,H/2); ctx.scale(sc,sc);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    // 다중 글로우 레이어 (shadowBlur 없이 stroke 외곽선으로)
    ctx.font=`bold ${f(130)}px 'Hahmlet',sans-serif`;
    ctx.strokeStyle='#000000'; ctx.lineWidth=f(14); ctx.lineJoin='round';
    ctx.strokeText('보스몹 등장!',0,0);
    ctx.strokeStyle='rgba(255,0,0,0.6)'; ctx.lineWidth=f(22);
    ctx.strokeText('보스몹 등장!',0,0);
    ctx.fillStyle='#ff2200'; ctx.fillText('보스몹 등장!',0,0);
    ctx.fillStyle='rgba(255,180,0,0.55)'; ctx.fillText('보스몹 등장!',0,0);
    ctx.fillStyle='#ffffff'; ctx.globalAlpha=0.85; ctx.fillText('보스몹 등장!',0,0);
    ctx.globalAlpha=1; ctx.restore();

    // 경고 테두리 맥박
    const pulse = 0.5+Math.sin(t*10)*0.5;
    ctx.save(); ctx.globalAlpha=pulse*0.85*fade;
    ctx.strokeStyle='#ff3300'; ctx.lineWidth=f(18);
    ctx.strokeRect(f(6),f(6),W-f(12),H-f(12));
    ctx.restore();

    // 불꽃 불씨
    this._drawEmbers(ctx,W,H);
  }

  // 팔각형 경로 헬퍼 (중심 0,0, 반지름 r, 회전 angle)
  _octPath(ctx, r, angle=0) {
    ctx.beginPath();
    for(let i=0;i<8;i++) {
      const a = angle + i*Math.PI/4;
      i===0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r)
            : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    }
    ctx.closePath();
  }

  // ── 보스 엔티티 드로우 ──
  _drawBoss(ctx,W,H,sx,sy,gs) {
    const boss = this._boss;
    const bx = boss.x*sx, by = boss.y*sy, br = boss.r*gs;
    const t = performance.now()/1000;
    const enraged = boss.enraged;
    const flashT = clamp(boss.hitFlash,0,1);
    // 팔각형 기본 회전 (천천히 회전)
    const octAngle = t * (enraged ? 0.9 : 0.4) + Math.PI/8;

    ctx.save(); ctx.translate(bx, by);

    // ── 외곽 글로우 (레이어드 팔각형, shadowBlur 없음) ──
    ctx.save(); ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha=0.18; ctx.fillStyle=enraged?'#ff5500':'#cc0033';
    this._octPath(ctx, br*2.0, octAngle); ctx.fill();
    ctx.globalAlpha=0.25;
    this._octPath(ctx, br*1.55, octAngle); ctx.fill();
    ctx.globalAlpha=1; ctx.restore();

    // ── 파동 링 (팔각형) ──
    for(let i=0;i<2;i++) {
      const ph=(t*(enraged?2.5:1.5)+i*Math.PI)%TAU;
      const ringA=Math.max(0,Math.sin(ph))*(enraged?0.6:0.35);
      if(ringA<0.04) continue;
      ctx.strokeStyle=enraged?`rgba(255,100,0,${ringA})`:`rgba(220,0,60,${ringA})`;
      ctx.lineWidth=gs*(enraged?4:2);
      this._octPath(ctx, br*(1.35+Math.sin(ph)*0.3), octAngle+ph*0.1); ctx.stroke();
    }

    // ── 분노 회전 오라 (4개로 줄임) ──
    if(enraged) {
      ctx.save(); ctx.globalCompositeOperation='lighter';
      for(let i=0;i<4;i++) {
        const ang=t*3.5+i*TAU/4;
        ctx.globalAlpha=0.5;
        ctx.strokeStyle=`rgba(255,${80+i*30},0,1)`;
        ctx.lineWidth=gs*2.5; ctx.lineCap='round';
        ctx.beginPath();
        ctx.moveTo(Math.cos(ang)*br*1.1, Math.sin(ang)*br*1.1);
        ctx.lineTo(Math.cos(ang+0.6)*br*1.55, Math.sin(ang+0.6)*br*1.55);
        ctx.stroke();
      }
      ctx.globalAlpha=1; ctx.restore();
    }

    // ── 몸체 베이스 (팔각형) ──
    const baseR = enraged?`rgb(${Math.round(lerp(100,255,flashT))},${Math.round(lerp(20,90,flashT))},0)`
                         :`rgb(${Math.round(lerp(70,255,flashT))},0,${Math.round(lerp(25,70,flashT))})`;
    this._octPath(ctx, br, octAngle); ctx.fillStyle=baseR; ctx.fill();

    // 테두리 (날카로운 팔각형 윤곽)
    ctx.strokeStyle=enraged?`rgba(255,180,0,${0.7+flashT*0.3})`:`rgba(255,60,60,${0.5+flashT*0.3})`;
    ctx.lineWidth=gs*(enraged?4:2.5);
    this._octPath(ctx, br, octAngle); ctx.stroke();

    // 그라디언트 오버레이
    const g1=ctx.createRadialGradient(-br*0.32,-br*0.32,br*0.04, br*0.08,br*0.08,br*1.15);
    g1.addColorStop(0, enraged?'rgba(255,160,80,0.8)':'rgba(255,80,80,0.7)');
    g1.addColorStop(0.22, enraged?'#ff5500':'#cc0033');
    g1.addColorStop(0.55, enraged?'#990000':'#660022');
    g1.addColorStop(1,'rgba(0,0,0,0.92)');
    this._octPath(ctx, br, octAngle); ctx.fillStyle=g1; ctx.fill();

    // ── 얼굴 ──
    ctx.save(); ctx.rotate(Math.sin(t*0.4)*0.06);
    const eyeOff=br*0.27, eyeR=br*0.21;
    [-1,1].forEach(s=>{
      const ex=s*eyeOff, ey=-br*0.08;
      const ep = enraged?0.5+Math.sin(t*18)*0.5:0.65+Math.sin(t*2.5+s)*0.35;
      // 눈 백색 (공막)
      ctx.fillStyle='rgba(255,255,255,0.12)';
      ctx.beginPath(); ctx.arc(ex,ey,eyeR*1.1,0,TAU); ctx.fill();
      // 눈 글로우 (layered circles, no shadowBlur)
      ctx.globalAlpha=0.35; ctx.fillStyle=enraged?'#ffaa00':'#ff2200';
      ctx.beginPath(); ctx.arc(ex,ey,eyeR*1.8,0,TAU); ctx.fill();
      ctx.globalAlpha=0.5;
      ctx.beginPath(); ctx.arc(ex,ey,eyeR*1.35,0,TAU); ctx.fill();
      ctx.globalAlpha=1;
      ctx.fillStyle=enraged?`rgba(255,${Math.round(ep*160)},0,0.97)`:`rgba(255,${Math.round(20+ep*50)},0,0.92)`;
      ctx.beginPath(); ctx.arc(ex,ey,eyeR,0,TAU); ctx.fill();
      // 동공 (세로 슬릿)
      ctx.fillStyle='#000';
      ctx.beginPath(); ctx.ellipse(ex+eyeR*0.15,ey,eyeR*0.22,eyeR*0.48,0,0,TAU); ctx.fill();
      // 눈빛 하이라이트
      ctx.fillStyle='rgba(255,255,255,0.75)';
      ctx.beginPath(); ctx.arc(ex-eyeR*0.28,ey-eyeR*0.3,eyeR*0.16,0,TAU); ctx.fill();
    });
    // 입
    const mw=br*0.52, my2=br*0.3;
    ctx.strokeStyle=enraged?'#ffaa00':'rgba(255,200,180,0.9)';
    ctx.lineWidth=br*0.075; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.beginPath(); ctx.moveTo(-mw,my2);
    for(let i=0;i<=8;i++) {
      const mx2=-mw+i*mw*2/8;
      const amp = enraged?br*0.14:br*0.08;
      ctx.lineTo(mx2, my2+(i%2===0?amp:-amp*0.55));
    }
    ctx.stroke();
    // 이마 뿔 (분노 시)
    if(enraged) {
      [-1,1].forEach(s=>{
        ctx.globalAlpha=0.45; ctx.fillStyle='#ff4400';
        ctx.beginPath();
        ctx.moveTo(s*eyeOff*0.7,-br*0.72);
        ctx.lineTo(s*eyeOff*1.25,-br*1.28);
        ctx.lineTo(s*eyeOff*0.35,-br*0.72);
        ctx.closePath(); ctx.fill();
        ctx.globalAlpha=1; ctx.fillStyle='#cc2200';
        ctx.beginPath();
        ctx.moveTo(s*eyeOff*0.7,-br*0.72);
        ctx.lineTo(s*eyeOff*1.1,-br*1.18);
        ctx.lineTo(s*eyeOff*0.35,-br*0.72);
        ctx.closePath(); ctx.fill();
      });
    }
    ctx.restore();

    // ── 히트 플래시 ──
    if(boss.hitFlash>0) {
      ctx.save(); ctx.globalCompositeOperation='lighter';
      ctx.globalAlpha=boss.hitFlash*0.22; ctx.fillStyle='#ffffff';
      this._octPath(ctx, br*2.0, octAngle); ctx.fill();
      ctx.globalAlpha=boss.hitFlash*0.45;
      this._octPath(ctx, br*1.4, octAngle); ctx.fill();
      ctx.globalAlpha=boss.hitFlash*0.75; ctx.fillStyle='rgba(255,255,255,0.9)';
      this._octPath(ctx, br, octAngle); ctx.fill();
      ctx.restore();
    }

    ctx.restore();

    // ── 말풍선 ──
    if(this.state===BOSS_FIGHT && boss.speechCooldown<3 && boss.speechCooldown>0) {
      const fadeIn=clamp((3-boss.speechCooldown)/0.6,0,1);
      this._drawSpeechBubble(ctx,bx,by-br-f(8)*gs,f,gs,fadeIn);
    }
  }

  _drawSpeechBubble(ctx, bx, by, f, gs, alpha) {
    ctx.save(); ctx.globalAlpha=alpha;
    const txt='문제다!';
    ctx.font=`bold ${f(32)}px 'Hahmlet',sans-serif`;
    const tw=ctx.measureText(txt).width;
    const pw=tw+f(28), ph=f(56), r2=f(14);
    const bx2=bx-pw/2, by2=by-ph;
    // 말풍선 배경
    ctx.fillStyle='rgba(255,255,255,0.96)';
    ctx.strokeStyle='#cc0000'; ctx.lineWidth=f(3);
    ctx.beginPath(); ctx.roundRect(bx2,by2,pw,ph,r2); ctx.fill(); ctx.stroke();
    // 꼬리 삼각형
    ctx.fillStyle='rgba(255,255,255,0.96)';
    ctx.beginPath(); ctx.moveTo(bx-f(12),by); ctx.lineTo(bx+f(12),by); ctx.lineTo(bx,by+f(14)); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#cc0000'; ctx.lineWidth=f(3);
    ctx.beginPath(); ctx.moveTo(bx-f(12),by); ctx.lineTo(bx,by+f(14)); ctx.lineTo(bx+f(12),by); ctx.stroke();
    // 텍스트
    ctx.fillStyle='#cc0000'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`bold ${f(32)}px 'Hahmlet',sans-serif`;
    ctx.fillText(txt, bx, by2+ph/2);
    ctx.restore();
  }

  // ── 보스 HP바 ──
  _drawBossHPBar(ctx,W,H,f) {
    const boss=this._boss;
    const t=performance.now()/1000;
    const barW=W*0.60, barH=f(32), bx=(W-barW)/2, by=f(12);
    const hpRatio=boss.hp/boss.maxHp;
    const enraged=boss.enraged;
    const pulse=enraged?0.6+Math.sin(t*16)*0.4:1;

    // 외곽 글로우 패널 (layered, no shadowBlur)
    ctx.save();
    ctx.globalAlpha=0.35; ctx.fillStyle=enraged?'#ff5500':'#cc0033';
    ctx.beginPath(); ctx.roundRect(bx-f(16),by-f(12),barW+f(32),barH+f(24),f(14)); ctx.fill();
    ctx.globalAlpha=1;
    ctx.fillStyle=enraged?'rgba(40,8,0,0.95)':'rgba(20,0,5,0.92)';
    ctx.strokeStyle=enraged?`rgba(255,100,0,${0.7+pulse*0.25})`:'rgba(200,0,40,0.7)';
    ctx.lineWidth=f(2.5);
    ctx.beginPath(); ctx.roundRect(bx-f(8),by-f(6),barW+f(16),barH+f(12),f(10));
    ctx.fill(); ctx.stroke();

    // 트랙
    ctx.fillStyle='rgba(80,0,10,0.6)';
    ctx.beginPath(); ctx.roundRect(bx,by,barW,barH,f(7)); ctx.fill();

    // 채우기
    if(hpRatio>0) {
      const fillW=barW*hpRatio;
      // 색상: HP에 따라 초록→노랑→빨강
      const hcol = enraged
        ? `hsl(${Math.round(20+Math.sin(t*12)*15)},100%,${Math.round(55+pulse*10)}%)`
        : hpRatio>0.6 ? '#22dd44' : hpRatio>0.35 ? '#ffcc00' : '#ff2222';
      // 그라디언트 채우기 (no shadowBlur)
      const hg=ctx.createLinearGradient(bx,by,bx,by+barH);
      hg.addColorStop(0,hcol); hg.addColorStop(0.5,'rgba(255,255,255,0.18)'); hg.addColorStop(1,hcol);
      ctx.fillStyle=hg;
      ctx.beginPath(); ctx.roundRect(bx,by,fillW,barH,f(7)); ctx.fill();
      // 표면 하이라이트
      ctx.fillStyle='rgba(255,255,255,0.18)';
      ctx.beginPath(); ctx.roundRect(bx+f(2),by+f(2),fillW-f(4),barH*0.38,f(4)); ctx.fill();
      // 분노 줄무늬
      if(enraged) {
        ctx.save(); ctx.globalAlpha=0.25;
        ctx.fillStyle='#ff8800';
        for(let i=0;i<Math.floor(fillW/(f(18)));i++) {
          const sx2=bx+i*f(18)+((t*60)%f(18));
          if(sx2>bx+fillW) break;
          ctx.beginPath(); ctx.moveTo(sx2,by); ctx.lineTo(sx2+f(10),by); ctx.lineTo(sx2+f(6),by+barH); ctx.lineTo(sx2-f(4),by+barH); ctx.closePath(); ctx.fill();
        }
        ctx.restore();
      }
    }

    // 라벨
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`bold ${f(18)}px 'Hahmlet',sans-serif`;
    ctx.fillStyle='#ffffff';
    ctx.strokeStyle='rgba(0,0,0,0.8)'; ctx.lineWidth=f(4); ctx.lineJoin='round';
    ctx.strokeText(`💀 BOSS  HP ${boss.hp} / ${boss.maxHp}`, W/2, by+barH/2);
    ctx.fillText(`💀 BOSS  HP ${boss.hp} / ${boss.maxHp}`, W/2, by+barH/2);
    ctx.restore();

    // 분노 배너
    if(enraged) {
      const p2=0.7+Math.sin(t*14)*0.3;
      ctx.save();
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.font=`bold ${f(26)}px 'Hahmlet',sans-serif`;
      ctx.fillStyle=`rgba(255,${Math.round(80+p2*60)},0,${p2})`;
      ctx.strokeStyle='rgba(80,0,0,0.7)'; ctx.lineWidth=f(5); ctx.lineJoin='round';
      ctx.strokeText('🔥 분노 상태!! 🔥', W/2, by+barH+f(24));
      ctx.fillText('🔥 분노 상태!! 🔥', W/2, by+barH+f(24));
      ctx.restore();
    }
  }

  // ── 보스 사망 연출 ──
  _drawBossDead(ctx,W,H,f) {
    const t=this._bossDeadT;
    const rt=performance.now()/1000;

    // 하얀 화면 베이스
    const whiteAlpha=Math.min(t/0.12,1)*(t>2.1?Math.max(0,1-(t-2.1)/0.7):1);
    ctx.fillStyle=`rgba(255,255,255,${whiteAlpha})`; ctx.fillRect(0,0,W,H);
    if(t<0.15) return;

    // 방사형 임팩트 속도선
    if(t<1.0) {
      this._drawSpeedLines(ctx,W,H,t,Math.min(t/0.3,1)*(t>0.7?(1-(t-0.7)/0.3):1));
    }

    // 보스 반쪽 실루엣
    const al=Math.min((t-0.12)/0.2,1)*(t>1.85?Math.max(0,1-(t-1.85)/0.55):1);
    const bx=W/2, by2=H*0.44;
    const r=Math.min(W,H)*0.20;
    const sepX=Math.min((t-0.12)*220,W*0.22);
    const sepY=Math.min((t-0.12)*60,H*0.06);
    const spinL=-(t-0.12)*2.5, spinR=(t-0.12)*2.5;
    ctx.save(); ctx.globalAlpha=al;
    [-1,1].forEach((s)=>{
      ctx.save();
      const hx=bx+s*sepX, hy=by2+sepY;
      ctx.translate(hx,hy); ctx.rotate(s===-1?spinL:spinR);
      // 팔각형 절반 클리핑
      ctx.beginPath();
      ctx.rect(s<0?-r*1.5:-0.5,-r*1.5,r*1.5,r*3);
      ctx.clip();
      // 팔각형 실루엣
      ctx.beginPath();
      for(let i=0;i<8;i++) {
        const a=Math.PI/8+i*Math.PI/4;
        i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
      }
      ctx.closePath();
      ctx.fillStyle='#0a0a0a'; ctx.fill();
      // 절단면 빨간 내부 빛
      ctx.strokeStyle='rgba(255,50,0,0.5)'; ctx.lineWidth=f(12);
      ctx.beginPath(); ctx.moveTo(0,-r*0.8); ctx.lineTo(0,r*0.8); ctx.stroke();
      // 절단면 흰 빛줄기
      ctx.strokeStyle='rgba(255,255,255,0.95)'; ctx.lineWidth=f(5);
      ctx.beginPath(); ctx.moveTo(0,-r); ctx.lineTo(0,r); ctx.stroke();
      ctx.restore();
    });
    ctx.restore();

    // 중앙 임팩트 플래시
    if(t<0.5) {
      const fl=Math.max(0,1-t/0.5);
      ctx.save(); ctx.globalCompositeOperation='lighter';
      const ig=ctx.createRadialGradient(bx,by2,0,bx,by2,r*3);
      ig.addColorStop(0,`rgba(255,200,0,${fl*0.9})`);
      ig.addColorStop(0.3,`rgba(255,60,0,${fl*0.5})`);
      ig.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=ig; ctx.fillRect(0,0,W,H); ctx.restore();
    }

    // "처치!" 텍스트
    if(t>0.3) {
      const ta=Math.min((t-0.3)/0.22,1)*(t>2.0?Math.max(0,1-(t-2.0)/0.5):1);
      const bounce=1+Math.sin(Math.min((t-0.3)/0.22,1)*Math.PI)*0.32;
      ctx.save(); ctx.globalAlpha=ta;
      ctx.translate(W/2,H*0.74); ctx.scale(bounce,bounce);
      ctx.textAlign='center'; ctx.textBaseline='middle';
      // 글로우 레이어
      ctx.font=`bold ${f(120)}px 'Hahmlet',sans-serif`;
      ctx.strokeStyle='rgba(0,0,0,0.9)'; ctx.lineWidth=f(20); ctx.lineJoin='round';
      ctx.strokeText('처치!',0,0);
      ctx.strokeStyle='rgba(255,60,0,0.55)'; ctx.lineWidth=f(12);
      ctx.strokeText('처치!',0,0);
      ctx.fillStyle='#ff4400'; ctx.fillText('처치!',0,0);
      ctx.fillStyle='#ffffff'; ctx.globalAlpha=ta*0.7; ctx.fillText('처치!',0,0);
      ctx.globalAlpha=ta; ctx.restore();
    }

    // 파티클 폭발
    if(t>0.1 && t<0.8) {
      ctx.save(); ctx.globalCompositeOperation='lighter';
      for(let i=0;i<24;i++) {
        const ang=(i/24)*TAU, dist=(t-0.1)*W*0.55;
        const px=bx+Math.cos(ang)*dist, py=by2+Math.sin(ang)*dist*0.6;
        const sz=f(5)*(1-(t-0.1)/0.7);
        const pa=0.9*(1-(t-0.1)/0.7);
        ctx.globalAlpha=pa*0.3; ctx.fillStyle='#ff4400';
        ctx.beginPath(); ctx.arc(px,py,sz*2.5,0,TAU); ctx.fill();
        ctx.globalAlpha=pa; ctx.fillStyle=`rgba(255,${80+i*7},0,1)`;
        ctx.beginPath(); ctx.arc(px,py,sz,0,TAU); ctx.fill();
      }
      ctx.restore();
    }
  }

  // ── 보스 퀴즈 오버레이 ──
  _drawBossQuizOverlay(ctx,W,H,f) {
    // 결과 표시 중
    if(this._bossQuizResult==='correct') {
      const t=Math.min(this._bossQuizResultT/2.0,1);
      this._drawSpeedLines(ctx,W,H,this._bossQuizResultT,Math.min(t*3,1));
      if(this.camFrame&&this.camFrame.readyState>=2) {
        const zoom=1+Math.min(this._bossQuizResultT*0.8,1)*1.2;
        ctx.save(); ctx.translate(W/2,H*0.3); ctx.scale(zoom,zoom); ctx.translate(-W/2,-H*0.3);
        ctx.save(); ctx.translate(W,0); ctx.scale(-1,1); ctx.drawImage(this.camFrame,0,0,W,H); ctx.restore(); ctx.restore();
      }
      this._drawFireEffect(ctx,W,H,this._bossQuizResultT);
      ctx.save(); ctx.globalAlpha=Math.min(t*4,1)*(t>0.88?1-(t-0.88)/0.12:1);
      ctx.translate(W/2,H*0.68); ctx.scale(1+Math.sin(this._bossQuizResultT*6)*0.06,1+Math.sin(this._bossQuizResultT*6)*0.06);
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.font=`bold ${f(88)}px 'Hahmlet',sans-serif`;
      ctx.strokeStyle='rgba(0,0,0,0.8)'; ctx.lineWidth=f(16); ctx.lineJoin='round';
      ctx.strokeText('데미지!',0,0);
      ctx.strokeStyle='rgba(255,120,0,0.5)'; ctx.lineWidth=f(8);
      ctx.strokeText('데미지!',0,0);
      ctx.fillStyle='#ffe040'; ctx.fillText('데미지!',0,0); ctx.restore();
      return;
    }
    if(this._bossQuizResult==='wrong') {
      const t=Math.min(this._bossQuizResultT/1.5,1);
      const flash=Math.sin(t*Math.PI);
      ctx.fillStyle=`rgba(200,0,0,${flash*0.72})`; ctx.fillRect(0,0,W,H);
      ctx.save(); ctx.globalAlpha=flash; ctx.translate(W/2,H*0.42);
      const sc=0.6+t*0.4; ctx.scale(sc,sc);
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.font=`bold ${f(100)}px 'Hahmlet',sans-serif`;
      ctx.strokeStyle='rgba(180,0,0,0.9)'; ctx.lineWidth=f(16); ctx.lineJoin='round';
      ctx.strokeText('틀렸어요!',0,0);
      ctx.fillStyle='#fff'; ctx.fillText('틀렸어요!',0,0);
      ctx.font=`bold ${f(52)}px 'Hahmlet',sans-serif`;
      ctx.fillStyle='#ffaaaa'; ctx.fillText('보스가 분노합니다!',0,f(80));
      if(this._bossQuiz) {
        ctx.font=`bold ${f(34)}px 'Hahmlet',sans-serif`;
        ctx.fillStyle='#ffeeee';
        ctx.fillText(`정답: ${BOX_LABEL[this._bossQuiz.ans]} ${this._bossQuiz.opts[this._bossQuiz.ans]}`,0,f(155));
      }
      ctx.restore();
      return;
    }
    // 문제 화면 (기존 퀴즈 UI 재사용)
    ctx.fillStyle='rgba(0,0,20,0.78)'; ctx.fillRect(0,0,W,H);
    if(!this._bossQuiz) return;
    const q=this._bossQuiz;
    ctx.font=`bold ${f(42)}px 'Hahmlet',sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const lines=this._wrapText(ctx,q.q,W*0.88);
    const lineH=f(50); const totalH=lines.length*lineH;
    const startY=H*0.13-totalH/2+lineH/2;
    lines.forEach((ln,li)=>{
      ctx.strokeStyle='rgba(0,0,0,0.8)'; ctx.lineWidth=f(6); ctx.lineJoin='round';
      ctx.strokeText(ln,W/2,startY+li*lineH);
      ctx.fillStyle='#ff6644'; ctx.fillText(ln,W/2,startY+li*lineH);
    });
    // 4박스
    for(let i=0;i<4;i++) {
      const b=QBR[i]; const bx=b.xl*W,by2=b.yt*H,bw=(b.xr-b.xl)*W,bh=(b.yb-b.yt)*H;
      const isHov=this._bossQuizHoverBox===i;
      const prog=isHov?Math.min(this._bossQuizHoverT/HOVER_SELECT_T,1):0;
      const r=Math.min(bw,bh)*0.1;
      ctx.save();
      if(isHov) { // 호버 글로우: 반투명 큰 박스
        ctx.globalAlpha=0.3; ctx.fillStyle=BOX_SHD[i];
        ctx.beginPath(); ctx.roundRect(bx-6,by2-6,bw+12,bh+12,r+4); ctx.fill();
        ctx.globalAlpha=1;
      }
      ctx.fillStyle=isHov?BOX_HOV[i]:BOX_FILL[i];
      ctx.beginPath(); ctx.roundRect(bx,by2,bw,bh,r); ctx.fill();
      ctx.strokeStyle=BOX_SHD[i]; ctx.lineWidth=isHov?4:2;
      ctx.beginPath(); ctx.roundRect(bx,by2,bw,bh,r); ctx.stroke();
      if(prog>0){ ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.beginPath(); ctx.roundRect(bx,by2+bh-bh*0.12,bw*prog,bh*0.12,r*0.5); ctx.fill(); }
      ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.font=`bold ${f(52)}px 'Hahmlet',sans-serif`;
      ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.lineWidth=f(4); ctx.lineJoin='round';
      ctx.strokeText(BOX_LABEL[i],bx+bw*0.05,by2+bh*0.5);
      ctx.fillStyle='#fff'; ctx.fillText(BOX_LABEL[i],bx+bw*0.05,by2+bh*0.5);
      ctx.textAlign='center';
      ctx.font=`bold ${f(40)}px 'Hahmlet',sans-serif`;
      ctx.fillStyle='#fff'; ctx.fillText(q.opts[i],bx+bw*0.58,by2+bh*0.5);
      ctx.restore();
    }
    // 남은 시간 바
    const remain=Math.max(0,1-this._bossQuizT/18);
    ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.fillRect(0,H*0.97,W,H*0.03);
    ctx.fillStyle='#ff6644'; ctx.fillRect(0,H*0.97,W*remain,H*0.03);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`${f(22)}px 'Hahmlet',sans-serif`;
    ctx.fillStyle='rgba(255,200,180,0.7)';
    ctx.fillText('손을 박스 위에 올려 유지하면 선택!',W/2,H*0.93);
    // 퀴즈 커서
    this._drawQuizCursor(ctx,W/GW,H/GH);
  }

  _drawCracks(ctx,W,H,progress) {
    if(progress <= 0) return;
    ctx.save();
    ctx.globalAlpha = progress * 0.75;
    ctx.strokeStyle = '#880000';
    ctx.lineWidth = 1.5;
    ctx.shadowBlur = 8;
    ctx.shadowColor = '#ff2200';

    // 균열 정의: [시작X비율, 시작Y비율, 세그먼트 목록 [dx,dy]]
    const cracks = [
      { sx:0.38,sy:0, segs:[[0.04,0.08],[-0.02,0.06],[0.03,0.05],[-0.01,0.04]] },
      { sx:0.55,sy:0, segs:[[-0.03,0.09],[0.02,0.07],[0.04,0.05],[0.01,0.04]] },
      { sx:0.70,sy:0, segs:[[0.05,0.06],[-0.02,0.08],[0.01,0.05]] },
      { sx:0.22,sy:0, segs:[[-0.02,0.07],[0.04,0.06],[-0.01,0.05]] },
    ];
    for(const cr of cracks) {
      let cx=cr.sx*W, cy=cr.sy*H;
      const total=cr.segs.length;
      const drawn=Math.ceil(total*progress);
      ctx.beginPath(); ctx.moveTo(cx,cy);
      for(let i=0;i<drawn;i++) {
        const seg=cr.segs[i];
        const fx = i===drawn-1 ? progress*total-Math.floor(progress*total) : 1;
        cx+=seg[0]*W*fx; cy+=seg[1]*H*fx;
        ctx.lineTo(cx,cy);
        // 가지 균열
        if(i>0 && i%2===0 && progress>0.5) {
          const bx=cx+(seg[1]*W*0.04), by=cy-(seg[0]*H*0.04);
          ctx.moveTo(cx,cy); ctx.lineTo(bx,by); ctx.moveTo(cx,cy);
        }
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  _drawBloodDrips(ctx,W,H,lt) {
    if(lt < 0.2) return;
    ctx.save();
    const drips = [
      {x:0.20, speed:0.38, width:8,  dropAt:0.7},
      {x:0.38, speed:0.52, width:5,  dropAt:0.9},
      {x:0.55, speed:0.41, width:10, dropAt:0.6},
      {x:0.68, speed:0.35, width:6,  dropAt:1.0},
      {x:0.82, speed:0.48, width:7,  dropAt:0.8},
      {x:0.10, speed:0.30, width:4,  dropAt:1.1},
    ];
    for(const dr of drips) {
      const elapsed = Math.max(0, lt - 0.2);
      const dripLen = Math.min(elapsed * dr.speed * H, H*0.28);
      if(dripLen <= 0) continue;

      const x = dr.x * W;
      // 흘러내리는 줄기
      const grad = ctx.createLinearGradient(x,0,x,dripLen);
      grad.addColorStop(0,'rgba(140,0,0,0.95)');
      grad.addColorStop(0.7,'rgba(100,0,0,0.85)');
      grad.addColorStop(1,'rgba(80,0,0,0.5)');
      ctx.fillStyle=grad;
      ctx.beginPath();
      ctx.moveTo(x-dr.width/2,0);
      ctx.quadraticCurveTo(x+dr.width*0.3, dripLen*0.5, x+dr.width/2, dripLen);
      ctx.quadraticCurveTo(x-dr.width*0.2, dripLen*0.8, x-dr.width/2,0);
      ctx.fill();

      // 방울 (끝에 동그란 방울)
      if(dripLen > H*0.05) {
        ctx.fillStyle='rgba(120,0,0,0.9)';
        ctx.shadowBlur=10; ctx.shadowColor='#800000';
        ctx.beginPath();
        ctx.arc(x, dripLen+dr.width*0.7, dr.width*0.85, 0, TAU);
        ctx.fill();
        ctx.shadowBlur=0;
      }
    }
    ctx.restore();
  }
}

// ═══════════════ MAIN ═══════════════
(async function main() {
  const canvas   = document.getElementById('c');
  const video    = document.getElementById('v');
  const audio    = new AudioEngine();
  const speedUI  = document.getElementById('speed-ui');
  const speedSlider = document.getElementById('speed-slider');
  const speedVal = document.getElementById('speed-val');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  preloadObjImages();
  const game = new Game(canvas, audio);
  window.addEventListener('keydown', e => game.keyDown(e.key));

  // 슬라이더 연동
  function updateSlider() {
    const v = parseInt(speedSlider.value);
    game.speedFactor = v / 100;
    speedSlider.style.setProperty('--pct', v + '%');
    if(v >= 100)     speedVal.textContent = '최고속도 🔥';
    else if(v >= 70) speedVal.textContent = `빠름 (${v}%)`;
    else if(v >= 40) speedVal.textContent = `보통 (${v}%)`;
    else             speedVal.textContent = `느림 (${v}%)`;
  }
  speedSlider.addEventListener('input', updateSlider);
  updateSlider();

  // ── 이름 입력 DOM 연동 ──
  const nameOverlay    = document.getElementById('name-overlay');
  const nameInputEl    = document.getElementById('name-input-field');
  const nameScoreEl    = document.getElementById('name-score');
  const nameConfirmBtn = document.getElementById('name-confirm-btn');
  const nameSlots      = [0,1,2].map(i=>document.getElementById(`slot${i}`));

  function updateNameSlots() {
    // compositionend 이후 완성된 글자 기준으로 앞 3자만 표시
    const chars = [...nameInputEl.value].slice(0,3);
    nameSlots.forEach((slot,i)=>{
      slot.textContent = chars[i] || '';
      slot.classList.toggle('filled', i < chars.length);
    });
  }

  // input 이벤트: 실시간 슬롯 갱신 (IME 조합 중에도)
  nameInputEl.addEventListener('input', updateNameSlots);
  // 조합 완료 후에도 한 번 더 갱신
  nameInputEl.addEventListener('compositionend', updateNameSlots);

  function doConfirmName() {
    const val = [...nameInputEl.value].slice(0,3).join('').trim();
    if(!val) return;
    game._confirmName(val);
    nameOverlay.style.display = 'none';
  }
  nameInputEl.addEventListener('keydown', e => { if(e.key==='Enter') doConfirmName(); });
  nameConfirmBtn.addEventListener('click', doConfirmName);

  let _wasNameInput = false;

  // 메뉴 DOM UI
  const splashBg   = document.getElementById('splash-bg');
  const menuUI     = document.getElementById('menu-ui');
  const menuBest   = document.getElementById('menu-best');
  const menuHint   = document.getElementById('menu-hint');
  const startBtn   = document.getElementById('start-btn');
  const bothBarWrap= document.getElementById('both-bar-wrap');
  const bothBarFill= document.getElementById('both-bar-fill');

  startBtn.addEventListener('click', () => {
    if(game.state===MENU||game.state===GAMEOVER) game._startTutorial();
  });

  function syncMenuUI() {
    const isMenu = game.state===MENU;
    splashBg.style.display  = isMenu ? 'block' : 'none';
    if(isMenu) menuUI.classList.add('visible');
    else       menuUI.classList.remove('visible');

    if(isMenu) {
      // 최고기록
      if(game.bestRecord.score > 0) {
        menuBest.textContent = `🏆 ${game.bestRecord.name}  ${game.bestRecord.score.toLocaleString()}점`;
        menuBest.style.display = 'block';
      } else {
        menuBest.style.display = 'none';
      }
      // 양손 진행바
      const prog = Math.min(game._bothTimer / game._BOTH_THRESH, 1);
      if(prog > 0) {
        bothBarWrap.classList.add('visible');
        bothBarFill.style.width = (prog*100) + '%';
      } else {
        bothBarWrap.classList.remove('visible');
      }
      // 게임오버 시 버튼 텍스트
      startBtn.textContent = game.state===GAMEOVER ? '⚔ 재시작 (SPACE)' : '⚔ 게임 시작 (SPACE)';
    }
  }

  // UI 동기화 (슬라이더 + 이름입력 오버레이)
  function syncSpeedUI() {
    speedUI.style.display = (game.state===MENU||game.state===GAMEOVER) ? 'block' : 'none';
    syncMenuUI();
    const isName = game.state===NAMEINPUT;
    if(isName && !_wasNameInput) {
      nameOverlay.style.display = 'block';
      nameInputEl.value = '';
      updateNameSlots();
      nameScoreEl.textContent = `점수  ${game.scoring.score.toLocaleString()}`;
      setTimeout(()=>{ nameInputEl.focus(); nameInputEl.select(); }, 60);
    } else if(!isName && _wasNameInput) {
      nameOverlay.style.display = 'none';
    }
    _wasNameInput = isName;
  }

  let handData = [null, null];

  // MediaPipe Hands
  const hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
  });
  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 0,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5,
    selfieMode: false
  });
  hands.onResults(results => {
    handData = [null, null];
    if(results.multiHandLandmarks) {
      results.multiHandLandmarks.forEach((lm, i) => {
        if(i>=2) return;
        // handedness.label: 카메라 기준 'Left'|'Right'
        // 미러 디스플레이이므로 카메라 Right = 화면 왼쪽 (blade[0])
        //                       카메라 Left  = 화면 오른쪽 (blade[1])
        const label = results.multiHandedness?.[i]?.label ?? 'Right';
        const idx   = label === 'Right' ? 0 : 1;
        const wrist = lm[0];
        // 소지→약지→중지→검지→엄지 끝, 손날 어느 방향에서도 감지
        const tipIdxs = [20, 16, 12, 8, 4];
        const tips = tipIdxs.map(i => ({ x:(1-lm[i].x)*GW, y:lm[i].y*GH }));
        handData[idx] = {
          tip:   tips[2], // 중지를 주 트레일 포인트로
          tips:  tips,
          wrist: { x:(1-wrist.x)*GW, y:wrist.y*GH },
          lm:    lm
        };
      });
    }
  });

  // Camera
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width:{ideal:1280}, height:{ideal:720}, facingMode:'user' }
    });
    video.srcObject = stream;
    await new Promise(res => { video.onloadedmetadata = res; });
    video.play();
    game.camFrame = video;

    // detection loop at ~30 fps
    let lastDetect = 0;
    const detect = async ts => {
      if(ts - lastDetect > 33) {
        lastDetect = ts;
        try { await hands.send({image: video}); } catch(e){}
      }
      requestAnimationFrame(detect);
    };
    requestAnimationFrame(detect);
  } catch(e) {
    console.warn('카메라 사용 불가:', e);
  }

  // Game loop at 60 fps
  let lastT = performance.now();
  const loop = ts => {
    const dtReal = Math.min(0.05, (ts-lastT)/1000);
    lastT = ts;
    game.update(dtReal, handData);
    game.render();
    syncSpeedUI();
    requestAnimationFrame(loop);
  };
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
