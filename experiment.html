<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>콘텐츠 전달 방식 연구</title>
<style>
:root{
  --bg:#F7F4EF;
  --surface:#FFFFFF;
  --ink:#2B2A27;
  --ink-soft:#7A766E;
  --line:#E3DEd4;
  --blue:#4A6FA5;
  --clay:#C2785A;
  --sage:#8DA17E;
  --radius:12px;
  --font-display:Georgia,'Noto Serif KR',serif;
  --font-body:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
#app{
  max-width:720px;
  margin:0 auto;
  padding:24px 20px 80px;
}
.eyebrow{
  font-size:13px;
  letter-spacing:0.08em;
  color:var(--ink-soft);
  text-transform:uppercase;
  margin-bottom:6px;
}
h1,h2,h3{
  font-family:var(--font-display);
  font-weight:700;
  margin:0 0 12px;
}
h1{font-size:28px;}
h2{font-size:22px;}
h3{font-size:17px;}
p{margin:0 0 14px;}
.card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:24px;
  margin-bottom:20px;
}
.progress-wrap{
  display:flex;
  gap:6px;
  margin-bottom:24px;
}
.progress-seg{
  flex:1;
  height:4px;
  background:var(--line);
  border-radius:2px;
  overflow:hidden;
}
.progress-seg.done .progress-fill{width:100%;}
.progress-seg.active .progress-fill{width:50%;}
.progress-fill{
  height:100%;
  width:0%;
  background:var(--blue);
  transition:width .4s ease;
}
.fact-block{
  border-top:1px solid var(--line);
  padding:20px 0;
}
.fact-block:first-of-type{border-top:none;padding-top:0;}
.fact-num{
  display:inline-block;
  font-family:var(--font-display);
  font-size:13px;
  color:var(--blue);
  border:1px solid var(--blue);
  border-radius:50%;
  width:22px;height:22px;
  text-align:center;
  line-height:20px;
  margin-bottom:10px;
}
.fact-text{
  font-size:16px;
  margin-bottom:16px;
}
.widget{
  background:#FBFAF7;
  border:1px solid var(--line);
  border-radius:8px;
  padding:16px;
}
.slider{
  width:100%;
  margin:8px 0;
  accent-color:var(--blue);
}
.readout{
  font-size:14px;
  color:var(--ink-soft);
  margin-bottom:8px;
}
.readout b{color:var(--ink);font-weight:600;}
.bar-bg{
  background:#EFEBE3;
  border-radius:6px;
  height:14px;
  overflow:hidden;
  margin:6px 0;
  position:relative;
}
.bar-fill{
  height:100%;
  border-radius:6px;
  transition:width .25s ease;
  background:var(--clay);
}
.bar-fill.sage{background:var(--sage);}
.bar-fill.blue{background:var(--blue);}
.bar-label{font-size:13px;color:var(--ink-soft);margin-bottom:2px;}
.zone-msg{
  font-size:13px;
  margin-top:8px;
  padding:6px 10px;
  border-radius:6px;
  background:#EEF2EC;
  color:#5C7156;
  display:inline-block;
}
.zone-msg.warn{background:#FBEDE6;color:#A55A38;}
.btn{
  font-family:var(--font-body);
  font-size:15px;
  font-weight:600;
  padding:11px 22px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  background:var(--blue);
  color:#fff;
  transition:opacity .2s;
}
.btn:hover{opacity:.88;}
.btn:disabled{background:#C9C5BC;cursor:not-allowed;}
.btn.secondary{
  background:transparent;
  color:var(--ink);
  border:1px solid var(--line);
}
.btn-row{margin-top:24px;display:flex;justify-content:flex-end;gap:10px;}
.likert{
  margin-bottom:24px;
}
.likert-q{font-size:15px;margin-bottom:10px;}
.likert-scale{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:4px;
}
.likert-scale label{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:12px;
  color:var(--ink-soft);
  cursor:pointer;
  flex:1;
}
.likert-scale input{
  margin-bottom:4px;
  accent-color:var(--blue);
  width:18px;height:18px;
}
.scale-endlabels{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:var(--ink-soft);
  margin-top:4px;
}
.quiz-q{margin-bottom:22px;}
.quiz-q p{font-weight:600;margin-bottom:10px;}
.quiz-options label{
  display:block;
  padding:10px 12px;
  border:1px solid var(--line);
  border-radius:8px;
  margin-bottom:6px;
  cursor:pointer;
  font-size:14px;
}
.quiz-options input{
  margin-right:8px;
  accent-color:var(--blue);
}
.intro-row{margin-bottom:16px;}
.intro-row label{display:block;font-weight:600;margin-bottom:6px;font-size:14px;}
.intro-row input[type=text]{
  width:100%;
  padding:10px 12px;
  border:1px solid var(--line);
  border-radius:8px;
  font-size:15px;
  font-family:var(--font-body);
}
.checkbox-row{
  display:flex;
  align-items:flex-start;
  gap:10px;
  margin-bottom:16px;
}
.checkbox-row input{margin-top:4px;width:18px;height:18px;flex-shrink:0;}
.checkbox-row label{font-size:14px;}
.svg-static{width:100%;height:auto;display:block;}
.fault-cards{display:flex;gap:8px;margin-bottom:12px;}
.fault-cards button{
  flex:1;
  padding:10px 6px;
  border:1px solid var(--line);
  border-radius:8px;
  background:#fff;
  cursor:pointer;
  font-family:var(--font-body);
  font-size:13px;
  font-weight:600;
  color:var(--ink-soft);
}
.fault-cards button.active{
  border-color:var(--blue);
  color:var(--blue);
  background:#EEF2F8;
}
.crack-msg{
  margin-top:8px;
  font-size:13px;
  color:var(--clay);
  font-weight:600;
  min-height:18px;
}
textarea#data-out{
  width:100%;
  height:140px;
  font-family:monospace;
  font-size:12px;
  border:1px solid var(--line);
  border-radius:8px;
  padding:10px;
}
@media (max-width:480px){
  #app{padding:16px 14px 60px;}
  h1{font-size:22px;}
  h2{font-size:19px;}
  .likert-scale label{font-size:10px;}
}

/* ---- Visual effect keyframes ---- */
@keyframes shake-light{
  0%,100%{transform:translate(0,0);}
  25%{transform:translate(-1px,1px);}
  50%{transform:translate(1px,-1px);}
  75%{transform:translate(-1px,-1px);}
}
@keyframes shake-heavy{
  0%,100%{transform:translate(0,0) rotate(0);}
  10%{transform:translate(-4px,2px) rotate(-0.5deg);}
  20%{transform:translate(4px,-2px) rotate(0.5deg);}
  30%{transform:translate(-3px,-3px) rotate(-0.3deg);}
  40%{transform:translate(3px,3px) rotate(0.3deg);}
  50%{transform:translate(-2px,2px) rotate(-0.2deg);}
  60%{transform:translate(2px,-2px) rotate(0.2deg);}
  70%{transform:translate(-3px,1px) rotate(-0.4deg);}
  80%{transform:translate(3px,-1px) rotate(0.4deg);}
  90%{transform:translate(-1px,1px) rotate(0);}
}
@keyframes flash-red{
  0%{background:#FBFAF7;}
  20%{background:#FBE4D9;}
  100%{background:#FBFAF7;}
}
@keyframes pulse-glow{
  0%,100%{box-shadow:0 0 0 0 rgba(141,161,126,0);}
  50%{box-shadow:0 0 0 8px rgba(141,161,126,0.25);}
}
@keyframes steam-rise{
  0%{transform:translateY(0) scaleX(1);opacity:0.7;}
  100%{transform:translateY(-30px) scaleX(1.6);opacity:0;}
}
@keyframes fill-rise{
  from{height:0;}
  to{height:var(--fill-h,60%);}
}
@keyframes ripple-out{
  0%{width:10px;height:10px;opacity:.9;border-width:3px;}
  100%{width:var(--maxsize,200px);height:var(--maxsize,200px);opacity:0;border-width:1px;}
}
@keyframes particle-pop{
  0%{transform:scale(0);}
  60%{transform:scale(1.2);}
  100%{transform:scale(1);}
}
.shake-light{animation:shake-light .3s ease;}
.shake-heavy{animation:shake-heavy .8s ease;}
.flash-red{animation:flash-red .8s ease;}
.pulse-glow{animation:pulse-glow 1.6s ease infinite;}
.global-shake{animation:shake-heavy .9s ease;}

/* ---- Coffee widget visuals ---- */
.coffee-scene{
  position:relative;
  background:linear-gradient(180deg, #FBFAF7 0%, #F4ECDD 100%);
  border-radius:8px;
  padding:14px;
  margin-bottom:10px;
  transition:background .4s ease;
  overflow:hidden;
}
.coffee-scene.hot{background:linear-gradient(180deg,#F4ECDD 0%,#F2C9A0 100%);}
.coffee-scene.toohot{background:linear-gradient(180deg,#F2C9A0 0%,#E89D7A 100%);}
.coffee-scene.cold{background:linear-gradient(180deg,#EFEBE3 0%,#DDE5EC 100%);}
.steam{position:absolute;left:50%;bottom:60%;width:6px;height:18px;background:rgba(255,255,255,0.6);border-radius:50%;opacity:0;pointer-events:none;}
.steam.s1{animation:steam-rise 2s ease-in-out infinite;}
.steam.s2{animation:steam-rise 2s ease-in-out infinite .4s;left:calc(50% - 10px);}
.steam.s3{animation:steam-rise 2s ease-in-out infinite .8s;left:calc(50% + 10px);}
.cup-svg{display:block;margin:0 auto;}
.particle-grid{
  display:grid;
  gap:4px;
  justify-content:center;
  padding:10px 0;
  min-height:60px;
}
.particle{
  background:#7C5A3D;
  border-radius:50%;
  animation:particle-pop .4s ease;
}
.ratio-vis{
  display:flex;
  align-items:flex-end;
  gap:14px;
  height:80px;
  padding:8px 4px;
  justify-content:center;
}
.ratio-bar{
  width:34px;
  border-radius:6px 6px 0 0;
  transition:height .35s ease, background .3s ease;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  color:#fff;
  font-size:11px;
  font-weight:600;
  padding-bottom:4px;
}
.ratio-coffee{background:#7C5A3D;}
.ratio-water{background:#6A93C0;}

/* ---- Quake widget visuals ---- */
.stress-scene{
  position:relative;
  background:#FBFAF7;
  border-radius:8px;
  padding:14px;
  transition:background .3s ease;
}
.stress-scene[data-level="1"]{background:#FBF5E8;}
.stress-scene[data-level="2"]{background:#FBE9D0;}
.stress-scene[data-level="3"]{background:#FBD9C0;}
.rock-svg{display:block;width:100%;}
.rock-body{fill:#D8D2C4;stroke:#A89E8C;stroke-width:1.5;transition:fill .3s ease;}
.rock-body.stressed-1{fill:#E6D6BD;}
.rock-body.stressed-2{fill:#E8C5A0;}
.rock-body.stressed-3{fill:#E5A480;}
.crack-line{stroke:#5C2E18;stroke-width:2.5;fill:none;stroke-dasharray:300;stroke-dashoffset:300;transition:stroke-dashoffset .25s ease;}
.crack-line.shown{stroke-dashoffset:0;}
.mag-scene{
  position:relative;
  background:linear-gradient(180deg,#FBFAF7 0%,#F4ECDD 100%);
  border-radius:8px;
  padding:14px;
  transition:background .35s ease;
}
.mag-scene[data-level="1"]{background:linear-gradient(180deg,#FBE9D0 0%,#F2C9A0 100%);}
.mag-scene[data-level="2"]{background:linear-gradient(180deg,#F2C9A0 0%,#E89D7A 100%);}
.mag-scene[data-level="3"]{background:linear-gradient(180deg,#E89D7A 0%,#B85A3A 100%);color:#fff;}
.mag-scene[data-level="3"] .readout{color:rgba(255,255,255,0.85);}
.mag-scene[data-level="3"] .readout b{color:#fff;}
.energy-dots{
  display:flex;
  flex-wrap:wrap;
  gap:3px;
  margin:8px 0;
  min-height:24px;
}
.energy-dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--clay);
  animation:particle-pop .3s ease;
}
.epicenter-svg{
  display:block;width:100%;height:160px;
  background:radial-gradient(ellipse at center, #FBF5E8 0%, #EAE6DC 100%);
  border-radius:8px;
}
.fault-canvas-svg{
  width:100%;height:90px;
  display:block;
  background:#FBFAF7;
  border-radius:6px;
}
.two-col{display:flex;gap:14px;flex-wrap:wrap;}
.two-col > div{flex:1;min-width:140px;}
.segments{display:flex;gap:6px;margin-top:6px;}
.segment{
  flex:1;
  text-align:center;
  font-size:12px;
  padding:10px 4px;
  border:1px solid var(--line);
  border-radius:6px;
  color:var(--ink-soft);
  background:#fff;
  transition:all .2s;
}
.segment.active{
  border-color:var(--blue);
  background:#EEF2F8;
  color:var(--blue);
  font-weight:600;
}
.plate-stage{position:relative;height:90px;background:#EAE6DC;border-radius:8px;overflow:hidden;margin-bottom:8px;}
.plate{
  position:absolute;top:15px;width:42%;height:60px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:12px;font-weight:600;
  transition:left .6s ease, right .6s ease;
}
.plate-left{left:4%;background:var(--sage);}
.plate-right{right:4%;background:var(--blue);}
.conv-label{position:absolute;bottom:4px;width:100%;text-align:center;font-size:11px;color:var(--ink-soft);}
.crack-svg{width:100%;height:70px;display:block;}
.crack-path{stroke:var(--clay);stroke-width:3;fill:none;stroke-dasharray:240;stroke-dashoffset:240;transition:stroke-dashoffset .6s ease;}
.crack-path.show{stroke-dashoffset:0;}
.quake-stage{position:relative;width:100%;height:140px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.quake-circle{
  position:absolute;border:2px solid var(--blue);border-radius:50%;
  width:10px;height:10px;opacity:0;
}
.quake-circle.anim{animation:quakeExpand 1.4s ease-out forwards;}
@keyframes quakeExpand{
  0%{width:10px;height:10px;opacity:.9;}
  100%{width:var(--maxsize,150px);height:var(--maxsize,150px);opacity:0;}
}
.quake-center{
  position:absolute;width:8px;height:8px;background:var(--clay);border-radius:50%;z-index:2;
}
.fault-diagram{
  position:relative;height:90px;border:1px solid var(--line);border-radius:6px;
  overflow:hidden;margin-top:10px;background:#fff;
}
.fault-block{
  position:absolute;width:62%;height:40px;background:#D8D2C4;border:1px solid #B7B0A2;
  display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--ink-soft);
  transition:transform .6s ease;
}
.fault-block.bk-top{top:8px;left:19%;}
.fault-block.bk-bottom{bottom:8px;left:19%;}
.fault-block.shift-normal-top{transform:translate(8px,18px);}
.fault-block.shift-normal-bottom{transform:translate(-8px,-2px);}
.fault-block.shift-reverse-top{transform:translate(-8px,-18px);}
.fault-block.shift-reverse-bottom{transform:translate(8px,2px);}
.fault-block.shift-strike-top{transform:translateX(30px);}
.fault-block.shift-strike-bottom{transform:translateX(-30px);}
.static-row{display:flex;gap:10px;align-items:center;justify-content:space-around;text-align:center;}
.static-row .label{font-size:12px;color:var(--ink-soft);margin-top:6px;}
</style>
</head>

const ENGAGEMENT_ITEMS = [
  "이 콘텐츠를 보는 동안 시간이 빨리 지나가는 느낌이 들었다.",
  "이 콘텐츠에 집중해서 다른 생각이 들지 않았다.",
  "이 콘텐츠가 재미있었다.",
  "이 콘텐츠를 더 탐색해보고 싶다는 생각이 들었다.",
  "이 콘텐츠를 이용하는 과정이 즐거웠다."
];

/* =========================================================
   STATE
========================================================= */
let state = {
  pid: "",
  group: null,
  order: [],
  flow: ["intro"],
  stepIndex: 0,
  modules: [], // {topic, condition, interactions, timeMs, engagement[], cogload, quizAnswers[], quizScore}
  _moduleStartTime: 0,
  _interactionCount: 0
};

function getOrder(group){
  if(group === 1) return [
    {topic:"A", condition:"interactive"},
    {topic:"B", condition:"static"}
  ];
  return [
    {topic:"A", condition:"static"},
    {topic:"B", condition:"interactive"}
  ];
}

function resetState(){
  state.pid = "";
  state.group = null;
  state.order = [];
  state.flow = ["intro"];
  state.stepIndex = 0;
  state.modules = [];
  state._moduleStartTime = 0;
  state._interactionCount = 0;
}

/* =========================================================
   ROUTER
========================================================= */
const app = document.getElementById("app");

function goNext(){
  state.stepIndex++;
  render();
  window.scrollTo(0,0);
}

function progressBar(activeIndex, total){
  let html = '<div class="progress-wrap">';
  for(let i=0;i<total;i++){
    let cls = "progress-seg";
    if(i < activeIndex) cls += " done";
    else if(i === activeIndex) cls += " active";
    html += `<div class="${cls}"><div class="progress-fill"></div></div>`;
  }
  html += "</div>";
  return html;
}

function render(){
  const step = state.flow[state.stepIndex];
  if(step === "intro") return renderIntro();
  if(step.startsWith("module")) return renderModule(parseInt(step.slice(6)));
  if(step.startsWith("survey")) return renderSurvey(parseInt(step.slice(6)));
  if(step.startsWith("quiz")) return renderQuiz(parseInt(step.slice(4)));
  if(step === "end") return renderEnd();
}

/* =========================================================
   SCREEN: INTRO
========================================================= */
function renderIntro(){
  const urlGroup = new URLSearchParams(location.search).get("g");
  app.innerHTML = `
    <div class="eyebrow">콘텐츠 전달 방식 연구</div>
    <h1>실험 안내</h1>

             <option value="1">그룹 1</option>
             <option value="2">그룹 2</option>
           </select>`}
      </div>
      <div class="checkbox-row">

      </div>
      <div class="btn-row">
        <button class="btn" id="start-btn" disabled>시작하기</button>
      </div>
    </div>

  const consentCheck = document.getElementById("consent-check");
  const groupSelect = document.getElementById("group-select");
  const startBtn = document.getElementById("start-btn");

  function validate(){
    const pidOk = pidInput.value.trim().length > 0;
    const consentOk = consentCheck.checked;
    const groupOk = urlGroup || (groupSelect && groupSelect.value);

  }
  pidInput.addEventListener("input", validate);

    state.modules = state.order.map(o => ({
      topic:o.topic, condition:o.condition,
      interactions:0, timeMs:0,
      engagement:[null,null,null,null,null], cogload:null,
      quizAnswers:[null,null,null,null,null], quizScore:0
    }));
    goNext();
  });
}

/* =========================================================
   SCREEN: MODULE (content)
========================================================= */
function renderModule(modIdx){
  const order = state.order[modIdx];
  const content = CONTENT[order.topic];
  state._interactionCount = 0;
  state._moduleStartTime = Date.now();

  let factsHtml = "";
  content.facts.forEach((fact, i) => {
    const widgetHtml = order.condition === "interactive"
      ? getInteractiveWidget(order.topic, i)
      : getStaticWidget(order.topic, i);
    factsHtml += `
      <div class="fact-block">
        <div class="fact-num">${i+1}</div>
        <p class="fact-text">${fact}</p>
        <div class="widget" data-fact="${i}">${widgetHtml}</div>
      </div>`;
  });

  app.innerHTML = `
    <div class="eyebrow">${modIdx+1} / 2 단계 · 콘텐츠</div>
    ${progressBar(modIdx*4, 8)}
    <h2>${content.title}</h2>
    ${factsHtml}
    <div class="btn-row">
      <button class="btn" id="module-next">다음</button>
    </div>
  `;

  if(order.condition === "interactive"){
    initWidgets(order.topic, app);
  }

  document.getElementById("module-next").addEventListener("click", () => {
    state.modules[modIdx].timeMs = Date.now() - state._moduleStartTime;
    state.modules[modIdx].interactions = state._interactionCount;
    goNext();
  });
}

/* =========================================================
   SCREEN: SURVEY (engagement + cognitive load)
========================================================= */
function renderSurvey(modIdx){
  let likertHtml = "";
  ENGAGEMENT_ITEMS.forEach((item, i) => {
    likertHtml += `
      <div class="likert">
        <div class="likert-q">${i+1}. ${item}</div>
        <div class="likert-scale">
          ${[1,2,3,4,5,6,7].map(v => `
            <label><input type="radio" name="eng${i}" value="${v}">${v}</label>
          `).join("")}
        </div>
        <div class="scale-endlabels"><span>전혀 그렇지 않다</span><span>매우 그렇다</span></div>
      </div>`;
  });

  app.innerHTML = `
    <div class="eyebrow">${modIdx+1} / 2 단계 · 설문</div>
    ${progressBar(modIdx*4+1, 8)}
    <h2>방금 본 콘텐츠에 대해</h2>
    <div class="card">
      <h3>몰입도</h3>
      ${likertHtml}
    </div>
    <div class="card">
      <h3>인지적 노력</h3>
      <div class="likert-q">방금 본 내용을 이해하는 데 들인 정신적 노력의 정도를 평가해 주세요.</div>
      <div class="likert-scale">
        ${[1,2,3,4,5,6,7,8,9].map(v => `
          <label><input type="radio" name="cogload" value="${v}">${v}</label>
        `).join("")}
      </div>
      <div class="scale-endlabels"><span>매우 적은 노력</span><span>매우 많은 노력</span></div>
    </div>
    <div class="btn-row">
      <button class="btn" id="survey-next" disabled>다음</button>
    </div>
  `;

  const allRadios = app.querySelectorAll('input[type=radio]');
  const nextBtn = document.getElementById("survey-next");
  function validate(){
    let allFilled = true;
    for(let i=0;i<5;i++){
      if(!app.querySelector(`input[name=eng${i}]:checked`)) allFilled = false;
    }
    if(!app.querySelector('input[name=cogload]:checked')) allFilled = false;
    nextBtn.disabled = !allFilled;
  }
  allRadios.forEach(r => r.addEventListener("change", validate));

  nextBtn.addEventListener("click", () => {
    for(let i=0;i<5;i++){
      state.modules[modIdx].engagement[i] = parseInt(app.querySelector(`input[name=eng${i}]:checked`).value);
    }
    state.modules[modIdx].cogload = parseInt(app.querySelector('input[name=cogload]:checked').value);
    goNext();
  });
}

/* =========================================================
   SCREEN: QUIZ
========================================================= */
function renderQuiz(modIdx){
  const topic = state.order[modIdx].topic;
  const quiz = CONTENT[topic].quiz;

  let quizHtml = "";
  quiz.forEach((q, i) => {
    quizHtml += `
      <div class="quiz-q">
        <p>${i+1}. ${q.q}</p>
        <div class="quiz-options">
          ${q.opts.map((opt, j) => `
            <label><input type="radio" name="quiz${i}" value="${j}"> ${opt}</label>
          `).join("")}
        </div>
      </div>`;
  });

  const isLast = modIdx === state.order.length - 1;

  app.innerHTML = `
    <div class="eyebrow">${modIdx+1} / 2 단계 · 이해도 확인</div>
    ${progressBar(modIdx*4+2, 8)}
    <h2>${CONTENT[topic].title} 관련 퀴즈</h2>
    <div class="card">${quizHtml}</div>
    <div class="btn-row">
      <button class="btn" id="quiz-next" disabled>${isLast ? "제출 및 결과 보기" : "다음 콘텐츠로"}</button>
    </div>
  `;

  const nextBtn = document.getElementById("quiz-next");
  function validate(){
    let allFilled = true;
    for(let i=0;i<5;i++){
      if(!app.querySelector(`input[name=quiz${i}]:checked`)) allFilled = false;
    }
    nextBtn.disabled = !allFilled;
  }
  app.querySelectorAll('input[type=radio]').forEach(r => r.addEventListener("change", validate));

  nextBtn.addEventListener("click", () => {
    let score = 0;
    for(let i=0;i<5;i++){
      const ans = parseInt(app.querySelector(`input[name=quiz${i}]:checked`).value);
      state.modules[modIdx].quizAnswers[i] = ans;
      if(ans === quiz[i].a) score++;
    }
    state.modules[modIdx].quizScore = score;
    goNext();
  });
}

/* =========================================================
   SCREEN: END
========================================================= */
function renderEnd(){
  const data = {
    pid: state.pid,
    group: state.group,
    modules: state.modules
  };
  const json = JSON.stringify(data, null, 2);

  app.innerHTML = `
    <div class="eyebrow">완료</div>
    ${progressBar(8, 8)}
    <h2>참여해 주셔서 감사합니다</h2>
    <div class="card">
      <p id="send-status">${SHEET_ENDPOINT ? "결과를 전송하는 중입니다..." : "아래 버튼을 눌러 응답 데이터를 저장해 주세요. 파일을 연구자에게 전달해 주시면 됩니다."}</p>
      <textarea id="data-out" readonly>${json}</textarea>
      <div class="btn-row">
        <button class="btn secondary" id="copy-btn">클립보드에 복사</button>
        <button class="btn secondary" id="download-btn">JSON 파일 다운로드</button>
        <button class="btn" id="restart-btn">처음으로</button>
      </div>
    </div>
  `;

  document.getElementById("copy-btn").addEventListener("click", () => {
    navigator.clipboard.writeText(json);
    const b = document.getElementById("copy-btn");
    b.textContent = "복사됨!";
    setTimeout(()=>b.textContent="클립보드에 복사", 1500);
  });

  document.getElementById("download-btn").addEventListener("click", () => {
    const blob = new Blob([json], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `result_${state.pid || "participant"}.json`;
    a.click();
    URL.revokeObjectURL(url);
  });

  document.getElementById("restart-btn").addEventListener("click", () => {
    resetState();
    render();
    window.scrollTo(0,0);
  });

  if(SHEET_ENDPOINT){
    fetch(SHEET_ENDPOINT, {
      method: "POST",
      mode: "no-cors",
      headers: {"Content-Type": "text/plain"},
      body: json
    }).then(() => {
      const status = document.getElementById("send-status");
      if(status) status.textContent = "결과가 자동으로 전송되었습니다. 만약을 위해 아래에서 다운로드본도 저장해 두시면 좋습니다.";
    }).catch(() => {
      const status = document.getElementById("send-status");
      if(status) status.textContent = "자동 전송에 실패했습니다. 아래에서 JSON 파일을 다운로드하여 연구자에게 전달해 주세요.";
    });
  }
}

/* =========================================================
   INIT INTERACTIVE WIDGETS (event wiring)
========================================================= */
function shake(el, heavy){
  if(!el) return;
  el.classList.remove("shake-light","shake-heavy");
  void el.offsetWidth; // restart animation
  el.classList.add(heavy ? "shake-heavy" : "shake-light");
}
function flashRed(el){
  if(!el) return;
  el.classList.remove("flash-red");
  void el.offsetWidth;
  el.classList.add("flash-red");
}

function initWidgets(topic, container){
  const $ = (sel) => container.querySelector(sel);
  const $$ = (sel) => container.querySelectorAll(sel);

  if(topic === "A"){
    // A0: 온도 -> 쓴맛 + 컵 색 + 김 + 배경 변화
    const tempSlider = $('[data-role="a0-temp"]');
    const scene = $('[data-bind="a0-scene"]');
    function updateA0(){
      const t = parseInt(tempSlider.value);
      $('[data-bind="a0-tempval"]').textContent = t;
      const pct = Math.max(0, Math.min(100, (t-80)/20*100));
      $('[data-bind="a0-bar"]').style.width = pct + "%";
      // scene mood
      scene.classList.remove("cold","hot","toohot");
      if(t < 88) scene.classList.add("cold");
      else if(t > 96) scene.classList.add("toohot");
      else if(t >= 90) scene.classList.add("hot");
      // liquid darkness with temp
      const liquidOpacity = 0.4 + (t-80)/30;
      $('[data-bind="a0-liquid"]').style.opacity = liquidOpacity;
      $('[data-bind="a0-surface"]').style.opacity = 0.4 + (t-80)/40;
      // steam visibility
      const steamOp = Math.max(0, (t-85)/15);
      ['a0-steam1','a0-steam2','a0-steam3'].forEach(k => {
        $(`[data-bind="${k}"]`).style.opacity = steamOp;
      });
      // message
      const msg = $('[data-bind="a0-msg"]');
      if(t >= 90 && t <= 96){
        msg.textContent = "✅ 적정 추출 온도 구간입니다";
        msg.className = "zone-msg";
      } else if(t < 90){
        msg.textContent = "적정 구간(90~96°C)보다 낮습니다";
        msg.className = "zone-msg warn";
      } else {
        msg.textContent = "적정 구간(90~96°C)보다 높습니다";
        msg.className = "zone-msg warn";
      }
    }
    tempSlider.addEventListener("input", () => { updateA0(); state._interactionCount++; });
    updateA0();

    // A1: 입자크기 -> 추출속도 + 입자 그리드 시각화
    const grindSlider = $('[data-role="a1-grind"]');
    const grid = $('[data-bind="a1-grid"]');
    function updateA1(){
      const g = parseInt(grindSlider.value);
      $('[data-bind="a1-val"]').textContent = g;
      $('[data-bind="a1-bar"]').style.width = (g*10) + "%";
      // particles: more & smaller as g goes up
      const cols = Math.min(20, 4 + g*2);
      const rows = Math.min(8, 2 + Math.floor(g/2));
      const size = Math.max(3, 16 - g*1.3);
      grid.style.gridTemplateColumns = `repeat(${cols}, ${size}px)`;
      grid.innerHTML = "";
      for(let i=0;i<cols*rows;i++){
        const p = document.createElement("div");
        p.className = "particle";
        p.style.width = size + "px";
        p.style.height = size + "px";
        p.style.animationDelay = (i*0.005) + "s";
        if(g >= 8) p.style.background = "#A63D1F"; // warning color
        grid.appendChild(p);
      }
      const msg = $('[data-bind="a1-msg"]');
      if(g >= 8){
        msg.textContent = "⚠ 입자가 매우 가늘어 과다추출 위험이 커집니다";
        msg.className = "zone-msg warn";
        shake(grid, false);
      } else {
        msg.textContent = "적절한 추출 속도입니다";
        msg.className = "zone-msg";
      }
    }
    grindSlider.addEventListener("input", () => { updateA1(); state._interactionCount++; });
    updateA1();

    // A2: 시간 -> 맛 변화 + 컵 채우기 + 색 변화
    const timeSlider = $('[data-role="a2-time"]');
    const fillRect = $('[data-bind="a2-fill"]');
    function updateA2(){
      const t = parseFloat(timeSlider.value);
      $('[data-bind="a2-val"]').textContent = t.toFixed(2);
      $('[data-bind="a2-seg0"]').classList.toggle("active", t > 0 && t <= 1.5);
      $('[data-bind="a2-seg1"]').classList.toggle("active", t >= 1.0 && t <= 3.0);
      $('[data-bind="a2-seg2"]').classList.toggle("active", t >= 2.5);
      // cup fill: more time = more fill + darker
      const fillH = (t/4) * 62;
      fillRect.setAttribute("y", 80 - fillH);
      fillRect.setAttribute("height", fillH);
      // color shift: yellow → amber → dark brown
      let color;
      if(t < 1.5) color = "#D4A24A"; // light amber (sour bright)
      else if(t < 2.5) color = "#9C5E2A"; // medium brown (sweet)
      else color = "#3D2412"; // dark brown (bitter)
      fillRect.setAttribute("fill", color);
    }
    timeSlider.addEventListener("input", () => { updateA2(); state._interactionCount++; });
    updateA2();

    // A3: 비율 -> 농도 + 시각적 바
    const coffeeSlider = $('[data-role="a3-coffee"]');
    const waterSlider = $('[data-role="a3-water"]');
    function updateA3(){
      const c = parseFloat(coffeeSlider.value);
      const w = parseFloat(waterSlider.value);
      $('[data-bind="a3-coffeeval"]').textContent = c;
      $('[data-bind="a3-waterval"]').textContent = w;
      const ratio = w / c;
      $('[data-bind="a3-ratio"]').textContent = ratio.toFixed(1);
      // visual bars
      $('[data-bind="a3-cbar"]').style.height = ((c-10)/20*70 + 20) + "%";
      $('[data-bind="a3-wbar"]').style.height = ((w-150)/250*70 + 20) + "%";
      const msg = $('[data-bind="a3-msg"]');
      if(ratio >= 14.5 && ratio <= 17.5){
        msg.textContent = "✅ 적정 농도 구간(1:15~1:17)입니다";
        msg.className = "zone-msg";
      } else if(ratio < 14.5){
        msg.textContent = "농도가 진한 편입니다";
        msg.className = "zone-msg warn";
      } else {
        msg.textContent = "농도가 연한 편입니다";
        msg.className = "zone-msg warn";
      }
    }
    coffeeSlider.addEventListener("input", () => { updateA3(); state._interactionCount++; });
    waterSlider.addEventListener("input", () => { updateA3(); state._interactionCount++; });
    updateA3();

    // A4: 종합 + dramatic 컵 채우기 + 김 + 흔들림
    $('[data-role="a4-calc"]').addEventListener("click", () => {
      state._interactionCount++;
      const t = parseFloat(tempSlider.value);
      const g = parseFloat(grindSlider.value);
      const time = parseFloat(timeSlider.value);
      const ratio = parseFloat(waterSlider.value) / parseFloat(coffeeSlider.value);

      let sour = Math.max(0, 100 - time*25);
      let sweet = Math.max(0, 100 - Math.abs(time-2)*40);
      let bitter = Math.min(100, (t-80)*4 + g*4 + time*12 + Math.max(0,(15-ratio))*3);
      bitter = Math.max(0, bitter);

      $('[data-bind="a4-sour"]').style.width = sour + "%";
      $('[data-bind="a4-sweet"]').style.width = sweet + "%";
      $('[data-bind="a4-bitter"]').style.width = bitter + "%";

      // cup fills dramatically
      const fill = $('[data-bind="a4-fill"]');
      fill.setAttribute("y", 18);
      fill.setAttribute("height", 62);
      let liquidColor = "#6B3F22";
      if(bitter > 70) liquidColor = "#2A1208"; // very dark
      else if(sour > 70) liquidColor = "#B57A2E"; // light
      fill.setAttribute("fill", liquidColor);

      // steam reveal
      $('[data-bind="a4-steam1"]').style.opacity = 1;
      $('[data-bind="a4-steam2"]').style.opacity = 1;

      const scene = $('[data-bind="a4-scene"]');
      shake(scene, bitter > 70); // dramatic shake if overextracted

      const verdict = $('[data-bind="a4-verdict"]');
      verdict.style.display = "inline-block";
      if(bitter > 70){
        verdict.textContent = "과다추출 경향: 쓰고 떫은 맛이 강해질 수 있습니다";
        verdict.className = "zone-msg warn";
      } else if(sour > 70 && bitter < 30){
        verdict.textContent = "과소추출 경향: 시고 밍밍한 맛이 날 수 있습니다";
        verdict.className = "zone-msg warn";
      } else {
        verdict.textContent = "✨ 적정추출 경향: 균형 잡힌 맛 프로필입니다";
        verdict.className = "zone-msg";
      }
    });
  }

  if(topic === "B"){
    // B0: 판 이동 + 진동
    let b0count = 0;
    $('[data-role="b0-progress"]').addEventListener("click", () => {
      state._interactionCount++;
      b0count = Math.min(b0count + 1, 5);
      $('[data-bind="b0-time"]').textContent = b0count * 10;
      $('[data-bind="b0-left"]').style.left = (4 + b0count*8) + "%";
      $('[data-bind="b0-right"]').style.right = (4 + b0count*8) + "%";
      shake($('[data-bind="b0-stage"]'), false);
    });

    // B1: 응력 누적 → 색 변화 → 임계점에서 화면 흔들림 + 단층 균열
    let stress = 0;
    const stressBar = $('[data-bind="b1-bar"]');
    const crackPath = $('[data-bind="b1-crack"]');
    const rock = $('[data-bind="b1-rock"]');
    const scene = $('[data-bind="b1-scene"]');
    const b1msg = $('[data-bind="b1-msg"]');
    $('[data-role="b1-push"]').addEventListener("click", () => {
      state._interactionCount++;
      stress += 25;
      const level = Math.min(3, Math.floor(stress/25));
      // bar color & width
      stressBar.style.width = Math.min(100, stress) + "%";
      let barColor = "#C2785A";
      if(stress >= 75) barColor = "#A63D1F";
      else if(stress >= 50) barColor = "#D4753A";
      stressBar.style.background = barColor;
      // rock color
      rock.classList.remove("stressed-1","stressed-2","stressed-3");
      if(stress > 0) rock.classList.add("stressed-" + level);
      // scene background level
      scene.dataset.level = level;
      // small shake at level 2+
      if(stress > 0 && stress < 100){
        shake(scene, false);
      }
      if(stress >= 100){
        stress = 0;
        // BIG MOMENT: heavy shake + crack reveal + flash + global page shake
        crackPath.classList.add("shown");
        flashRed(scene);
        shake(scene, true);
        document.getElementById("app").classList.add("global-shake");
        setTimeout(() => document.getElementById("app").classList.remove("global-shake"), 900);
        b1msg.textContent = "💥 응력이 한계를 넘어 단층이 끊어지며 지진이 발생했습니다!";
        b1msg.style.color = "var(--clay)";
        b1msg.style.fontWeight = "700";
        setTimeout(() => {
          stressBar.style.width = "0%";
          stressBar.style.background = "#C2785A";
          crackPath.classList.remove("shown");
          rock.classList.remove("stressed-1","stressed-2","stressed-3");
          scene.dataset.level = "0";
          b1msg.textContent = "";
        }, 2000);
      }
    });

    // B2: 규모 -> 에너지 + 위젯 흔들림 강도 + 색 변화 + 에너지 도트
    const magSlider = $('[data-role="b2-mag"]');
    const magScene = $('[data-bind="b2-scene"]');
    const dotsEl = $('[data-bind="b2-dots"]');
    function updateB2(){
      const m = parseFloat(magSlider.value);
      $('[data-bind="b2-val"]').textContent = m.toFixed(1);
      const multiple = Math.pow(32, m-4);
      const barPct = Math.min(100, ((m-4)/5)*100);
      $('[data-bind="b2-bar"]').style.width = barPct + "%";
      const display = multiple < 10 ? multiple.toFixed(1) : Math.round(multiple).toLocaleString("ko-KR");
      $('[data-bind="b2-msg"]').textContent = `M4 대비 약 ${display}배의 에너지`;
      // color scene by magnitude
      let level = 0;
      if(m >= 8) level = 3;
      else if(m >= 6.5) level = 2;
      else if(m >= 5.5) level = 1;
      magScene.dataset.level = level;
      // energy dots proportional (log-ish)
      const dotCount = Math.min(60, Math.floor(Math.pow(2, m-4)));
      dotsEl.innerHTML = "";
      for(let i=0;i<dotCount;i++){
        const d = document.createElement("div");
        d.className = "energy-dot";
        d.style.animationDelay = (i*0.012) + "s";
        if(level === 3) d.style.background = "#fff";
        else if(level === 2) d.style.background = "#5C2E18";
        dotsEl.appendChild(d);
      }
      // shake intensity scales with magnitude
      if(m >= 5.5) shake(magScene, m >= 7);
    }
    magSlider.addEventListener("input", () => { updateB2(); state._interactionCount++; });
    updateB2();

    // B3: 지진 발생 - SVG 동심원 + 전체 화면 흔들림
    let ground = "hard";
    const svg = $('[data-bind="b3-svg"]');
    const ringsG = $('[data-bind="b3-rings"]');
    const SVG_NS = "http://www.w3.org/2000/svg";
    $('[data-role="b3-trigger"]').addEventListener("click", () => {
      state._interactionCount++;
      ringsG.innerHTML = "";
      const isSoft = ground === "soft";
      const ringConfigs = isSoft ? [40, 70, 110, 150] : [30, 55, 85];
      ringConfigs.forEach((r, i) => {
        const c = document.createElementNS(SVG_NS, "circle");
        c.setAttribute("cx", 150);
        c.setAttribute("cy", 80);
        c.setAttribute("r", 6);
        c.setAttribute("fill", "none");
        c.setAttribute("stroke", isSoft ? "#A63D1F" : "#C2785A");
        c.setAttribute("stroke-width", 2.5);
        c.style.opacity = "0";
        ringsG.appendChild(c);
        const delay = i * 180;
        setTimeout(() => {
          c.style.transition = "r 1.6s ease-out, opacity 1.6s ease-out, stroke-width 1.6s ease-out";
          c.setAttribute("r", r);
          c.style.opacity = "0.9";
          setTimeout(() => {
            setTimeout(() => {
              c.style.opacity = "0";
              c.setAttribute("stroke-width", "0.5");
            }, 100);
          }, 16);
        }, delay);
      });
      // page-wide shake
      shake(svg, isSoft);
      const appEl = document.getElementById("app");
      appEl.classList.remove("global-shake");
      void appEl.offsetWidth;
      appEl.classList.add("global-shake");
      setTimeout(() => appEl.classList.remove("global-shake"), 900);
      // message update
      const msg = $('[data-bind="b3-msg"]');
      msg.textContent = isSoft
        ? "약한 지반: 진동이 더 멀리, 더 강하게 퍼집니다"
        : "단단한 지반: 진동이 빠르게 약해집니다";
    });
    $('[data-role="b3-ground"]').addEventListener("click", (e) => {
      state._interactionCount++;
      ground = ground === "hard" ? "soft" : "hard";
      e.target.textContent = ground === "hard" ? "지반: 단단함" : "지반: 약함";
    });

    // B4: 단층 종류 - SVG 블록 이동 + 단층선 강조 + 흔들림
    const faultBtns = $$('[data-role="b4-btn"]');
    const b4top = $('[data-bind="b4-top"]');
    const b4bottom = $('[data-bind="b4-bottom"]');
    const faultline = $('[data-bind="b4-faultline"]');
    const b4svg = $('[data-bind="b4-svg"]');
    const b4msg = $('[data-bind="b4-msg"]');
    const faultDesc = {
      normal: "정단층: 양쪽 블록이 서로 멀어지며 한쪽이 아래로 내려갑니다 (장력 환경)",
      reverse: "역단층: 양쪽 블록이 서로 밀리며 한쪽이 위로 올라갑니다 (압축 환경)",
      strike: "횡단층: 양쪽 블록이 수평 방향으로 서로 반대로 미끄러집니다"
    };
    const faultMoves = {
      normal:  {top:"translate(0,5px)",  bottom:"translate(0,-5px)"},
      reverse: {top:"translate(0,-5px)", bottom:"translate(0,5px)"},
      strike:  {top:"translate(-25px,0)",bottom:"translate(25px,0)"}
    };
    faultBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        state._interactionCount++;
        const type = btn.dataset.type;
        faultBtns.forEach(b => b.classList.toggle("active", b === btn));
        // reset position
        b4top.style.transform = "translate(0,0)";
        b4bottom.style.transform = "translate(0,0)";
        faultline.setAttribute("stroke-width", "0");
        // animate after a beat
        setTimeout(() => {
          b4top.style.transform = faultMoves[type].top;
          b4bottom.style.transform = faultMoves[type].bottom;
          faultline.setAttribute("stroke-width", "2");
          shake(b4svg, false);
        }, 100);
        b4msg.textContent = faultDesc[type];
      });
    });
    // initial state
    setTimeout(() => {
      b4top.style.transform = faultMoves.normal.top;
      b4bottom.style.transform = faultMoves.normal.bottom;
      faultline.setAttribute("stroke-width", "2");
    }, 200);
  }
}

/* =========================================================
   INIT
========================================================= */
render();
</script>
</body>
</html>
